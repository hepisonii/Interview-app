<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preparation – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary-dark: #0f172a;
      --primary-dark-hover: #1e293b;
      --bg-main: #f8f8f6;
      --surface: #ffffff;
      --border-color: #e4e4e0;
      --text-dark: #0f172a;
      --text-mid: #6b7280;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 80px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.02);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 4px 14px 4px 4px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid #e5e7eb;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
    }
    
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .nav-logo-icon {
      background: var(--primary-dark);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-logo-icon i { color: #fff; font-size: 12px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      background: var(--surface);
      border-right: 1px solid var(--border-color);
      z-index: 50;
    }
    .nav-items { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      flex: 1; 
      width: 100%; 
      align-items: center; 
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 64px; height: 64px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: var(--text-muted);
    }
    
    .nav-item:hover {
      background-color: #f3f4f6;
      color: var(--text-dark);
    }
    
    .nav-item.active {
      background-color: var(--primary-dark);
      color: #ffffff;
    }
    
    .nav-icon { 
      font-size: 18px; 
      line-height: 1; 
    }
    
    .nav-label {
      font-size: 9px; 
      font-weight: 700;
      text-transform: uppercase; 
      letter-spacing: 0.05em;
    }
    .nav-item.active .nav-label { 
      color: #ffffff; 
    }

    .sidebar-bottom { 
      width: 100%; 
      display: flex; 
      justify-content: center; 
      padding-top: 16px; 
      border-top: 1px solid var(--border-color); 
    }

    /* ── MAIN CONTENT AREA ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── THE INTERVIEW CARD ── */
    .interview-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }

    .card-header {
      margin-bottom: 24px;
      text-align: left;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 400;
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 0.02em;
    }
    
    .detail-label::after {
      content: " *";
      color: #dc2626;
    }

    /* Input/Select layout styles */
    .detail-value-static,
    .detail-select {
      width: 100%;
      height: 44px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .detail-value-static {
      display: flex;
      align-items: center;
      color: var(--text-dark);
    }

    .detail-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230f172a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px 14px;
      padding-right: 40px;
    }

    .detail-select:focus {
      border-color: var(--primary-dark);
      background-color: #fff;
    }

    /* STARK NAVY PRIMARY BUTTON */
    .start-btn {
      width: 100%;
      height: 44px;
      background-color: var(--primary-dark);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .start-btn:hover {
      background-color: var(--primary-dark-hover);
    }

    .btn-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    form {
      width: 100%;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">U</div>
      <span class="user-name-nav" id="navName"></span>
    </div>
  </div>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-target"></i></div>
    <span>Interview Portal</span>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item active" href="/interview/preparation" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item" title="User Stats" id="userStats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="/settings" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom" id="sidebarBottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="interview-card">
      <div class="card-header">
        <h2 class="card-title" id="interviewTitle">Frontend Interview</h2>
        <p class="card-subtitle">Ready to showcase your skills?</p>
      </div>
      
      <form method="post" action="/user/start-interview">
        <div class="card-details">
          
          <div class="detail-item">
            <span class="detail-label">Duration</span>
            <div class="detail-value-static">40 minutes</div>
          </div>

          <div class="detail-item">
            <span class="detail-label">Difficulty</span>
            <select name="difficulty" class="detail-select" required>
              <option value="easy">Easy (theoretical)</option>
              <option value="medium">Medium (theoretical+technical)</option>
              <option value="hard">Hard (totally technical)</option>
            </select>
          </div>
          
          <div class="detail-item">
            <span class="detail-label">Role</span>
            <select name="role" class="detail-select" required id="roleSelect">
              <option value="frontend">Frontend</option>
              <option value="backend">Backend</option>
              <option value="cybersecurity">Cybersecurity</option>
            </select>
          </div>
        </div>
        
        <button type="submit" class="start-btn">
          <span class="btn-text">Start Interview <i class="ti ti-rocket"></i></span>
        </button>
      </form>
    </div>
  </main>
</div>

<script>
  const navName = document.getElementById("navName");
  const navAvatar = document.getElementById("navAvatar");
  const roleSelect = document.getElementById("roleSelect");
  const interviewTitle = document.getElementById("interviewTitle");

  function syncSidebarAuth(user) {
    const sidebarBottom = document.getElementById("sidebarBottom");
    if (!sidebarBottom) return;
    if (user && Object.keys(user).length) {
      sidebarBottom.innerHTML = `
        <a class="nav-item" href="/user/logout" title="Logout">
          <span class="nav-icon">🚪</span>
          <span class="nav-label">Logout</span>
        </a>
      `;
    } else {
      sidebarBottom.innerHTML = `
        <a class="nav-item" href="/user/login" title="Login">
          <span class="nav-icon">🔐</span>
          <span class="nav-label">Login</span>
        </a>
      `;
    }
  }

  fetch("/api/current-user")
  .then(res => res.json())
  .then(user => {
    if(Object.keys(user).length){
      navName.innerText = user.fullname;
      navAvatar.innerHTML = `<img src="${user.profileImageURL}">`;
      
      roleSelect.value = user.role ? user.role.toLowerCase() : "frontend";
      
      const roleDisplay = user.role ? user.role.charAt(0).toUpperCase() + user.role.slice(1) : "Frontend";
      interviewTitle.innerText = `${roleDisplay} Interview`;
      
      const link = document.getElementById("userStats");
      link.href = `/stats/${user._id}`;
      syncSidebarAuth(user);
    } else {
      syncSidebarAuth(null);
    }
  })
  .catch(err => {
    navName.innerText = "User";
    navAvatar.textContent = "U";
    syncSidebarAuth(null);
  });

  roleSelect.addEventListener('change', (e) => {
    const selectedRole = e.target.value;
    const roleDisplay = selectedRole.charAt(0).toUpperCase() + selectedRole.slice(1);
    interviewTitle.innerText = `${roleDisplay} Interview`;
  });
</script>
</body>
</html>
