<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --text-dark: #1e1b4b;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 72px;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #c9d6ff 0%, #e8e8f0 45%, #fce4ec 100%);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: #a5b4fc;
      top: -160px; left: -120px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 440px; height: 440px;
      background: #fbcfe8;
      bottom: -130px; right: -90px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift { to { transform: translate(30px, 25px) scale(1.07); } }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,0.60);
      box-shadow: 0 2px 24px rgba(100,100,200,0.10);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(199,210,254,0.8);
      border-radius: 40px;
      padding: 5px 16px 5px 5px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav { font-size: 13px; font-weight: 600; color: var(--text-dark); }

    /* Center INTERVIEW title */
    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
    }
    .nav-title-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--indigo);
      opacity: 0.6;
    }

    /* Timer */
    .nav-timer {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(199,210,254,0.8);
      border-radius: 40px;
      padding: 6px 18px 6px 8px;
      transition: border-color 0.3s, background 0.3s;
    }
    .nav-timer.warning {
      border-color: rgba(251,146,60,0.7);
      background: rgba(255,237,213,0.6);
    }
    .nav-timer.danger {
      border-color: rgba(239,68,68,0.7);
      background: rgba(254,226,226,0.6);
      animation: pulseRed 1s ease-in-out infinite;
    }
    @keyframes pulseRed {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 0 3px rgba(239,68,68,0.18); }
    }
    .timer-icon-wrap {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .nav-timer.warning .timer-icon-wrap { background: linear-gradient(135deg, #fb923c, #ea580c); }
    .nav-timer.danger  .timer-icon-wrap { background: linear-gradient(135deg, #f87171, #ef4444); }
    .timer-display {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
      text-align: center;
      transition: color 0.3s;
    }
    .nav-timer.warning .timer-display { color: #c2410c; }
    .nav-timer.danger  .timer-display { color: #dc2626; }

    /* LAYOUT */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
      position: relative; z-index: 1;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 0 24px;
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-right: 1px solid rgba(255,255,255,0.60);
      z-index: 50; gap: 6px;
    }
    .nav-items { display: flex; flex-direction: column; gap: 6px; flex: 1; width: 100%; align-items: center; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; width: 52px; height: 52px; border-radius: 14px;
      cursor: pointer; transition: all 0.22s; text-decoration: none;
      border: 1.5px solid transparent;
    }
    .nav-item:hover { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.25); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(129,140,248,0.22), rgba(99,102,241,0.14));
      border-color: rgba(129,140,248,0.45);
      box-shadow: 0 3px 14px rgba(99,102,241,0.14);
    }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em; transition: color 0.2s;
    }
    .nav-item:hover .nav-label,
    .nav-item.active .nav-label { color: var(--indigo); }
    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 12px; border-top: 1px solid rgba(199,210,254,0.25); }

    /* MAIN */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 36px 200px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* QUESTION */
    .question-container {
      max-width: 800px;
      margin: 0 auto;
      animation: slideIn 0.5s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(129,140,248,0.2);
    }
    .question-number {
      font-size: 12px;
      font-weight: 700;
      color: var(--indigo);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: rgba(129,140,248,0.12);
      padding: 6px 12px;
      border-radius: 12px;
    }
    .question-text {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.6;
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.4);
      border-left: 4px solid var(--indigo);
      border-radius: 8px;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(129,140,248,0.2);
      border-top-color: var(--indigo);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message {
      background: rgba(239,68,68,0.1);
      border: 1.5px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 20px;
      color: #dc2626;
      text-align: center;
      margin: 40px 0;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 48px;
      left: var(--sidebar-w);
      right: 0;
      z-index: 90;
      padding: 0 36px;
      display: flex;
      justify-content: center;
      animation: slideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .input-pill {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: flex-end;
      gap: 14px;
      background: rgba(255,255,255,0.58);
      border: 1.5px solid rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 14px 14px 14px 22px;
      box-shadow: 0 8px 40px rgba(99,102,241,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .input-pill:focus-within {
      border-color: rgba(129,140,248,0.55);
      box-shadow: 0 8px 48px rgba(99,102,241,0.24), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .answer-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-dark);
      outline: none;
      resize: none;
      min-height: 26px;
      max-height: 160px;
      line-height: 1.65;
      padding: 2px 0;
      overflow-y: auto;
    }
    .answer-input::placeholder { color: var(--text-muted); }
    .answer-btn {
      flex-shrink: 0;
      padding: 10px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      color: #fff;
      border: 2px solid transparent;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 20px rgba(99,102,241,0.32);
      white-space: nowrap;
    }
    .answer-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(99,102,241,0.55); }
    .answer-btn:active { transform: translateY(-1px); }
    .btn-text {
      position: relative; z-index: 3;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-text::after { content: '→'; display: inline-block; transition: transform 0.25s ease; }
    .answer-btn:hover .btn-text::after { transform: translateX(3px); }
    .btn-glow {
      position: absolute; inset: -2px; border-radius: 14px; padding: 2px;
      background: linear-gradient(90deg, #6366f1, #818cf8, #a78bfa, #818cf8, #6366f1);
      background-size: 200% 100%;
      animation: trainRun 3s linear infinite;
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 0; pointer-events: none;
    }
    @keyframes trainRun {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .answer-btn:hover .btn-glow { animation-duration: 1.5s; }
    .answer-btn::before {
      content: '';
      position: absolute; inset: 0; border-radius: 14px;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 70%);
      z-index: 2;
    }
    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }
    .answer-status {
      display: flex; gap: 6px;
      margin-left: 12px; padding-left: 12px;
      border-left: 1px solid rgba(129,140,248,0.2);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(99,102,241,0.3);
    }
    .status-dot.answered {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16,185,129,0.4);
    }

    /* TIME UP OVERLAY */
    .timeup-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(30,27,75,0.55);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
    }
    .timeup-card {
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 48px 52px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(99,102,241,0.22);
    }
    .timeup-emoji { font-size: 52px; margin-bottom: 20px; }
    .timeup-title { font-size: 26px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; }
    .timeup-sub { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }
    .timeup-btn {
      padding: 12px 36px;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      color: white; border: none; border-radius: 14px;
      font-weight: 700; font-size: 15px; cursor: pointer;
      transition: all 0.3s;
    }
    .timeup-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.4); }

    /* RESULTS PAGE STYLES */
    .results-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .results-header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInDown 0.6s ease;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-emoji {
      font-size: 64px;
      margin-bottom: 20px;
      display: inline-block;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .results-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      font-family: 'Syne', sans-serif;
    }

    .results-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .results-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
      animation: staggerIn 0.6s ease 0.2s both;
    }

    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-card {
      background: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(129,140,248,0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(129,140,248,0.6);
      background: rgba(255,255,255,0.65);
      box-shadow: 0 8px 32px rgba(99,102,241,0.12);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--indigo);
      font-family: 'Syne', sans-serif;
    }

    .stat-value.percentage {
      font-size: 36px;
    }

    .feedback-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: staggerIn 0.6s ease 0.4s both;
    }

    .feedback-card {
      background: rgba(255,255,255,0.48);
      border: 1.5px solid rgba(129,140,248,0.25);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      transition: all 0.3s ease;
      border-left: 5px solid var(--indigo);
    }

    .feedback-card:hover {
      border-color: rgba(129,140,248,0.5);
      background: rgba(255,255,255,0.58);
      box-shadow: 0 12px 48px rgba(99,102,241,0.12);
      transform: translateX(4px);
    }

    .feedback-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(129,140,248,0.15);
    }

    .feedback-q-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--indigo);
      text-transform: uppercase;
      background: rgba(129,140,248,0.12);
      padding: 6px 12px;
      border-radius: 10px;
    }

    .feedback-score {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
    }

    .score-badge {
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    .feedback-section {
      margin-bottom: 20px;
    }

    .feedback-section:last-child {
      margin-bottom: 0;
    }

    .feedback-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feedback-label-icon {
      font-size: 14px;
    }

    .feedback-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-dark);
      padding: 12px;
      background: rgba(255,255,255,0.4);
      border-left: 3px solid var(--indigo);
      border-radius: 6px;
    }

    .question-box {
      background: rgba(99,102,241,0.08);
      border-left: 4px solid var(--indigo);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .answer-box {
      background: rgba(16,185,129,0.08);
      border-left: 4px solid var(--success);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .ai-feedback-box {
      background: rgba(129,140,248,0.08);
      border-left: 4px solid var(--indigo);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 0;
    }

    .results-footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(129,140,248,0.2);
      animation: fadeInUp 0.6s ease 0.6s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .final-score-section {
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(129,140,248,0.1));
      border: 2px solid rgba(129,140,248,0.4);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      margin-top: 48px;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      animation: fadeInUp 0.6s ease 0.7s both;
    }

    .final-score-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .final-score-value {
      font-size: 64px;
      font-weight: 700;
      color: var(--indigo);
      font-family: 'Syne', sans-serif;
      margin-bottom: 12px;
    }

    .final-score-message {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar"></div>
      <span class="user-name-nav" id="navName"></span>
    </div>
  </div>

  <div class="nav-title">
    <span class="nav-title-dot"></span>
    INTERVIEW
    <span class="nav-title-dot"></span>
  </div>

  <div class="nav-timer" id="navTimer">
    <div class="timer-icon-wrap">⏱</div>
    <span class="timer-display" id="timerDisplay">40:00</span>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item" href="preparation.html" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item" href="userstats.html" title="User Stats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="leaderboard.html" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="settings.html" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="login.ejs" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div id="chatContent">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading your interview questions...</p>
      </div>
    </div>

    <div id="resultsContent" class="hidden">
      <div class="results-container">
        <div class="results-header">
          <div class="results-emoji">🎉</div>
          <h1 class="results-title">Interview Complete!</h1>
          <p class="results-subtitle">Your answers have been reviewed by our AI. See your detailed feedback below.</p>
        </div>

        <div class="feedback-list" id="feedbackList"></div>
      </div>
    </div>
  </main>
</div>

<!-- BOTTOM INPUT BAR -->
<div class="bottom-bar" id="bottomBar">
  <div style="width:100%; max-width:760px;">
    <div class="input-pill">
      <textarea
        class="answer-input"
        id="answerInput"
        placeholder="Write your answer here..."
        rows="1"></textarea>
      <button type="button" class="answer-btn" id="answerBtn">
        <span class="btn-glow"></span>
        <span class="btn-text">Answer</span>
      </button>
      <div class="answer-status">
        <div class="status-dot" id="statusDot" title="Not answered yet"></div>
      </div>
    </div>
    <p class="input-hint">Shift+Enter for new line</p>
  </div>
</div>

<script>
  // ══════════════════════════════
  // TIMER — 40 minutes countdown
  // ══════════════════════════════
  const TOTAL_SECONDS = 40 * 60;
  let secondsLeft = TOTAL_SECONDS;
  let timerInterval = null;

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function updateTimerUI() {
    const display = document.getElementById('timerDisplay');
    const timerEl = document.getElementById('navTimer');
    display.textContent = formatTime(secondsLeft);
    timerEl.classList.remove('warning', 'danger');
    if (secondsLeft <= 60) {
      timerEl.classList.add('danger');
    } else if (secondsLeft <= 5 * 60) {
      timerEl.classList.add('warning');
    }
  }

  function startTimer() {
    updateTimerUI();
    timerInterval = setInterval(() => {
      secondsLeft--;
      updateTimerUI();
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        onTimeUp();
      }
    }, 1000);
  }

  function onTimeUp() {
    document.getElementById('bottomBar').style.display = 'none';
    const overlay = document.createElement('div');
    overlay.className = 'timeup-overlay';
    overlay.innerHTML = `
      <div class="timeup-card">
        <div class="timeup-emoji">⏰</div>
        <div class="timeup-title">Time's Up!</div>
        <div class="timeup-sub">
          Your 40-minute interview session has ended.<br>
          Submit your answers now.
        </div>
        <button class="timeup-btn" onclick="submitQuiz()">📤 Submit Answers</button>
      </div>
    `;
    document.body.appendChild(overlay);
  }

  // ══════════════════════════════
  // STATE
  // ══════════════════════════════
  let questions = [];
  let currentIndex = 0;
  let userAnswersArray = [];
  let feedbackData = [];

  // ══════════════════════════════
  // USER INFO
  // ══════════════════════════════
  fetch("/api/current-user")
    .then(r => r.json())
    .then(user => {
      document.getElementById("navName").innerText = user.fullname;
      document.getElementById("navAvatar").innerHTML = `<img src="${user.profileImageURL}">`;
    })
    .catch(() => {
      document.getElementById("navName").innerText = "User";
      document.getElementById("navAvatar").textContent = "U";
    });

  // ══════════════════════════════
  // FETCH QUESTIONS
  // ══════════════════════════════
  fetch("/interview/fetch")
    .then(res => res.json())
    .then(data => {
      console.log("Questions from API:", data);
      questions = data;
      currentIndex = 0;
      console.log("Total questions: ", questions.length);
      if (questions && questions.length > 0) {
        showQuestion(currentIndex);
        startTimer();
      } else {
        showError("No questions received");
      }
    })
    .catch(error => {
      console.error("API Error:", error);
      showError("Failed to load questions: " + error.message);
    });

  // ══════════════════════════════
  // DISPLAY QUESTION
  // ══════════════════════════════
  function showQuestion(index) {
    const currentQuestion = questions[index];
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container">
        <div class="question-header">
          <span class="question-number">Question ${index + 1} of ${questions.length}</span>
        </div>
        <div class="question-text">${currentQuestion.question}</div>
      </div>
    `;
    const textarea = document.getElementById("answerInput");
    textarea.value = "";
    textarea.style.height = "auto";
    textarea.focus();
  }

  function showError(msg) {
    document.getElementById("chatContent").innerHTML = `
      <div class="error-message"><h3>Error</h3><p>${msg}</p></div>
    `;
  }

  // ══════════════════════════════
  // ANSWER SUBMISSION
  // ══════════════════════════════
  document.getElementById("answerBtn").addEventListener("click", () => {
    const textarea = document.getElementById("answerInput");
    const answerText = textarea.value.trim();
    if (!answerText) {
      alert("Please write an answer before proceeding!");
      return;
    }
    const currentQuestion = questions[currentIndex];
    const answerObject = {
      questionId: currentQuestion._id,
      question: currentQuestion.question,
      answer: answerText
    };
    userAnswersArray.push(answerObject);
    console.log("📝 Answer saved:", answerObject);
    console.log("📋 All answers so far:", userAnswersArray);

    if (currentIndex === questions.length - 1) {
      showQuizComplete();
    } else {
      currentIndex++;
      showQuestion(currentIndex);
    }
  });

  // ══════════════════════════════
  // QUIZ COMPLETE
  // ══════════════════════════════
  function showQuizComplete() {
    clearInterval(timerInterval);
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container" style="text-align: center; margin-top: 60px;">
        <div style="font-size: 48px; margin-bottom: 20px;">✨</div>
        <h2 style="font-size: 28px; color: var(--text-dark); margin-bottom: 16px;">Quiz Complete!</h2>
        <p style="color: var(--text-muted); font-size: 16px; margin-bottom: 32px; line-height: 1.6;">
          You've answered all ${questions.length} questions.<br>✓ Ready to submit!
        </p>
        <div style="background: rgba(255,255,255,0.4); padding: 20px; border-radius: 12px; backdrop-filter: blur(24px);">
          <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">
            Questions answered: <strong style="color: var(--indigo);">${userAnswersArray.length}/${questions.length}</strong>
          </p>
          <button style="padding:12px 32px; background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px;" onclick="submitQuiz()">
            📤 Submit All Answers
          </button>
        </div>
      </div>
    `;
    document.getElementById("bottomBar").style.display = "none";
  }

  // ══════════════════════════════
  // SUBMIT & SHOW RESULTS
  // ══════════════════════════════
  function submitQuiz() {
    clearInterval(timerInterval);
    const overlay = document.querySelector('.timeup-overlay');
    if (overlay) overlay.remove();

    const payload = { answers: userAnswersArray };
    console.log("📤 Submitting:", JSON.stringify(payload, null, 2));

    document.getElementById("chatContent").innerHTML = `
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Submitting your answers to the backend...</p>
      </div>
    `;
fetch("/fetch/attemptId")
  .then(res => res.json())
  .then(attemptData => {
    const attemptId = attemptData.attemptId || attemptData._id || attemptData;

    return fetch(`/interview/attempt/${attemptId}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  })
  .then(res => {
    if (!res.ok) {
      return res.text().then(text => {
        throw new Error(`HTTP error! status: ${res.status} - ${text}`);
      });
    }
    return res.json();
  })
  .then((submitResponse) => {
    console.log("🔥 FINAL RESPONSE:", submitResponse);

    const { data, totalScore } = submitResponse;

    // 👇 SAME UX (no change)
    displayResults(data);
  })
  .catch(error => {
    console.error("❌ Submission error:", error);
    document.getElementById("chatContent").innerHTML = `
      <div class="error-message">
        <h3>❌ Submission Error</h3>
        <p><strong>Error:</strong> ${error.message}</p>
      </div>
    `;
  });
  }
  // ══════════════════════════════
  // DISPLAY RESULTS — one by one review
  // ══════════════════════════════
  let reviewIndex = 0;
  let reviewData = [];

  function displayResults(data) {
    reviewData = data;
    reviewIndex = 0;
    document.getElementById("bottomBar").style.display = "none";
    showReviewCard(reviewIndex);
  }

  function showReviewCard(index) {
    const item = reviewData[index];  // { attemptId, questionId, answer, score, feedback }
    const isLast = index === reviewData.length - 1;

    // get question text from userAnswersArray by questionId
    const ua = userAnswersArray.find(
      a => String(a.questionId) === String(item.questionId)
    );

    document.getElementById("chatContent").classList.remove("hidden");
    document.getElementById("resultsContent").classList.add("hidden");

    document.getElementById("chatContent").innerHTML = `
      <div class="question-container">
        <div class="question-header">
          <span class="question-number">Question ${index + 1} of ${reviewData.length}</span>
        </div>

        <div class="question-text">${ua?.question || ""}</div>

        <div style="margin-top: 24px;">
          <div style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px;">✍️ Your Answer</div>
          <div style="font-size: 15px; line-height: 1.7; color: var(--text-dark); padding: 16px; background: rgba(16,185,129,0.08); border-left: 4px solid var(--success); border-radius: 8px;">
            ${item.answer}
          </div>
        </div>

        <div style="margin-top: 24px;">
          <div style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px;">⭐ Score</div>
          <div style="font-size: 15px; line-height: 1.7; color: var(--text-dark); padding: 16px; background: rgba(99,102,241,0.08); border-left: 4px solid var(--indigo); border-radius: 8px;">
            ${item.score}/5
          </div>
        </div>

        <div style="margin-top: 24px;">
          <div style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px;">🤖 AI Feedback</div>
          <div style="font-size: 15px; line-height: 1.7; color: var(--text-dark); padding: 16px; background: rgba(129,140,248,0.08); border-left: 4px solid var(--indigo-light); border-radius: 8px;">
            ${item.aiFeedback || "No feedback available"}
          </div>
        </div>

        <div style="margin-top: 32px; text-align: right;">
          ${isLast
            ? `<button onclick="showDone()" style="padding:12px 32px; background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px;">Done ✓</button>`
            : `<button onclick="showReviewCard(${index + 1})" style="padding:12px 32px; background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px;">Next →</button>`
          }
        </div>
      </div>
    `;
  }

  function showDone() {
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container" style="text-align: center; margin-top: 60px;">
        <div style="font-size: 56px; margin-bottom: 20px;">🎉</div>
        <h2 style="font-size: 28px; color: var(--text-dark); margin-bottom: 16px;">All Done!</h2>
        <p style="color: var(--text-muted); font-size: 16px; line-height: 1.6;">
          You've reviewed all your answers.<br>Good luck with your results!
        </p>
      </div>
    `;
  }

  // ══════════════════════════════
  // TEXTAREA AUTO-GROW
  // ══════════════════════════════
  const textarea = document.getElementById("answerInput");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + "px";
  });
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("answerBtn").click();
    }
  });
</script>
</body>
</html>
