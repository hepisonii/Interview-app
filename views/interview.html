<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Answer – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --text-dark: #1e1b4b;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 72px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #c9d6ff 0%, #e8e8f0 45%, #fce4ec 100%);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: #a5b4fc;
      top: -160px; left: -120px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 440px; height: 440px;
      background: #fbcfe8;
      bottom: -130px; right: -90px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift { to { transform: translate(30px, 25px) scale(1.07); } }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,0.60);
      box-shadow: 0 2px 24px rgba(100,100,200,0.10);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(199,210,254,0.8);
      border-radius: 40px;
      padding: 5px 16px 5px 5px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 800; color: var(--indigo);
      letter-spacing: 0.04em;
      background: rgba(129,140,248,0.12);
      border: 1px solid rgba(129,140,248,0.28);
      border-radius: 22px;
      padding: 5px 14px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
      position: relative; z-index: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 0 24px;
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-right: 1px solid rgba(255,255,255,0.60);
      z-index: 50; gap: 6px;
    }
    .nav-items { display: flex; flex-direction: column; gap: 6px; flex: 1; width: 100%; align-items: center; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; width: 52px; height: 52px; border-radius: 14px;
      cursor: pointer; transition: all 0.22s; text-decoration: none;
      border: 1.5px solid transparent;
    }
    .nav-item:hover { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.25); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(129,140,248,0.22), rgba(99,102,241,0.14));
      border-color: rgba(129,140,248,0.45);
      box-shadow: 0 3px 14px rgba(99,102,241,0.14);
    }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em; transition: color 0.2s;
    }
    .nav-item:hover .nav-label,
    .nav-item.active .nav-label { color: var(--indigo); }
    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 12px; border-top: 1px solid rgba(199,210,254,0.25); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 36px 200px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM INPUT BAR ── */
    .bottom-bar {
      position: fixed;
      bottom: 48px;
      left: var(--sidebar-w);
      right: 0;
      z-index: 90;
      padding: 0 36px;
      display: flex;
      justify-content: center;
      animation: slideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .input-pill {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: flex-end;
      gap: 14px;
      background: rgba(255,255,255,0.58);
      border: 1.5px solid rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 14px 14px 14px 22px;
      box-shadow: 0 8px 40px rgba(99,102,241,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .input-pill:focus-within {
      border-color: rgba(129,140,248,0.55);
      box-shadow: 0 8px 48px rgba(99,102,241,0.24), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .answer-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-dark);
      outline: none;
      resize: none;
      min-height: 26px;
      max-height: 160px;
      line-height: 1.65;
      padding: 2px 0;
      overflow-y: auto;
    }
    .answer-input::placeholder { color: var(--text-muted); }

    /* Answer button */
    .answer-btn {
      flex-shrink: 0;
      padding: 10px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      color: #fff;
      border: 2px solid transparent;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 20px rgba(99,102,241,0.32);
      white-space: nowrap;
    }
    .answer-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(99,102,241,0.55);
    }
    .answer-btn:active { transform: translateY(-1px); }

    .btn-text {
      position: relative; z-index: 3;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-text::after {
      content: '→';
      display: inline-block;
      transition: transform 0.25s ease;
    }
    .answer-btn:hover .btn-text::after { transform: translateX(3px); }

    .btn-glow {
      position: absolute; inset: -2px; border-radius: 14px; padding: 2px;
      background: linear-gradient(90deg, #6366f1, #818cf8, #a78bfa, #818cf8, #6366f1);
      background-size: 200% 100%;
      animation: trainRun 3s linear infinite;
      -moz-animation: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 0; pointer-events: none;
    }
    @keyframes trainRun {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .answer-btn:hover .btn-glow { animation-duration: 1.5s; }

    .answer-btn::before {
      content: '';
      position: absolute; inset: 0; border-radius: 14px;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 70%);
      z-index: 2;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar"></div>
      <span class="user-name-nav" id="navName"></span>
    </div>
  </div>
  <div class="nav-logo">🎯 Interview Portal</div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item" href="preparation.html" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item" href="userstats.html" title="User Stats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="leaderboard.html" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="settings.html" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="login.ejs" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Chat content goes here -->
    <div id="chatContent"></div>
  </main>
</div>

<!-- BOTTOM INPUT BAR -->
<div class="bottom-bar">
  <div style="width:100%; max-width:760px;">
    <form method="POST" action="/submit-answer" id="answerForm">
      <div class="input-pill">
        <textarea
          class="answer-input"
          name="answer"
          id="answerInput"
          placeholder="Write your answer here..."
          rows="1"
          required></textarea>
        <button type="submit" class="answer-btn">
          <span class="btn-glow"></span>
          <span class="btn-text">Answer</span>
        </button>
      </div>
    </form>
    <p class="input-hint">Shift+Enter for new line</p>
  </div>
</div>

<script>
  /* ── User info ── */
  const navName   = document.getElementById("navName");
  const navAvatar = document.getElementById("navAvatar");
  fetch("/api/current-user")
    .then(r => r.json())
    .then(user => {
      navName.innerText = user.fullname;
      navAvatar.innerHTML = `<img src="${user.profileImageURL}">`;
    })
    .catch(() => {
      navName.innerText = "User";
      navAvatar.textContent = "U";
    });

  /* ── Auto-grow textarea ── */
  const textarea = document.getElementById("answerInput");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + "px";
  });

  /* ── Enter to submit, Shift+Enter for newline ── */
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("answerForm").requestSubmit();
    }
  });
  fetch("/interview/fetch")
  .then(res => res.json())
  .then(questions => {
    
  })
</script>
</body>
</html>
