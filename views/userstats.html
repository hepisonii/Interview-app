<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Stats – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --surface: rgba(255, 255, 255, 0.44);
      --border: rgba(255, 255, 255, 0.72);
      --text-dark: #1e1b4b;
      --text-mid: #4b5563;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 72px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #c9d6ff 0%, #e8e8f0 45%, #fce4ec 100%);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: #a5b4fc;
      top: -160px; left: -120px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 440px; height: 440px;
      background: #fbcfe8;
      bottom: -130px; right: -90px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift { to { transform: translate(30px, 25px) scale(1.07); } }
    
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,0.60);
      box-shadow: 0 2px 24px rgba(100,100,200,0.10);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(199,210,254,0.8);
      border-radius: 40px;
      padding: 5px 16px 5px 5px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 800; color: var(--indigo);
      letter-spacing: 0.04em;
      background: rgba(129,140,248,0.12);
      border: 1px solid rgba(129,140,248,0.28);
      border-radius: 22px;
      padding: 5px 14px;
    }
    .layout { display: flex; padding-top: var(--nav-h); min-height: 100vh; position: relative; z-index: 1; }
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 0 24px;
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-right: 1px solid rgba(255,255,255,0.60);
      z-index: 50; gap: 6px;
    }
    .nav-items { display: flex; flex-direction: column; gap: 6px; flex: 1; width: 100%; align-items: center; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      width: 52px; height: 52px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.22s;
      text-decoration: none;
      border: 1.5px solid transparent;
    }
    .nav-item:hover { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.25); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(129,140,248,0.22), rgba(99,102,241,0.14));
      border-color: rgba(129,140,248,0.45);
      box-shadow: 0 3px 14px rgba(99,102,241,0.14);
    }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; transition: color 0.2s; }
    .nav-item:hover .nav-label, .nav-item.active .nav-label { color: var(--indigo); }
    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 12px; border-top: 1px solid rgba(199,210,254,0.25); }
    
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    .page-pill {
      display: inline-block;
      background: rgba(129,140,248,0.13);
      border: 1px solid rgba(129,140,248,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px; font-weight: 700;
      color: var(--indigo);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 24px;
    }

    /* STATS DASHBOARD LAYOUT */
    .dashboard-container {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 28px;
    }

    @media (max-width: 820px) {
      .dashboard-container { grid-template-columns: 1fr; }
    }

    /* Left Big Card: Profile Details */
    .profile-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(100,100,200,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-big-avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 700; color: #fff;
      overflow: hidden; border: 3px solid rgba(255,255,255,0.6);
    }
    .profile-big-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      color: var(--text-dark); margin-bottom: 6px;
    }

    .profile-degree {
      font-size: 14px; font-weight: 600; color: var(--indigo);
      background: rgba(129,140,248,0.12);
      padding: 4px 14px; border-radius: 12px;
      margin-bottom: 24px; display: inline-block;
    }

    .profile-meta-list {
      width: 100%;
      border-top: 1px solid rgba(199,210,254,0.4);
      padding-top: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .profile-meta-item {
      display: flex; justify-content: space-between; align-items: center; font-size: 14px;
    }
    .meta-label { color: var(--text-muted); font-weight: 500; }
    .meta-value { color: var(--text-dark); font-weight: 700; }

    /* Right Grid: Core Metrics Cards */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .metric-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-radius: 20px; padding: 24px;
      display: flex; flex-direction: column; justify-content: space-between;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      box-shadow: 0 4px 20px rgba(100,100,200,0.04);
    }
    .metric-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 28px rgba(99,102,241,0.12);
      border-color: rgba(129,140,248,0.4);
    }

    .metric-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .metric-title {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .metric-icon-wrap {
      width: 32px; height: 32px; border-radius: 10px;
      background: rgba(129,140,248,0.12);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }

    .metric-value {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800; color: var(--text-dark); line-height: 1;
    }
    .metric-value-small {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800; color: var(--text-dark); line-height: 1.2;
    }
    .metric-sub { font-size: 12px; color: var(--text-mid); margin-top: 8px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">--</div>
      <span class="user-name-nav" id="navName">Loading Profile...</span>
    </div>
  </div>
  <div class="nav-logo">🎯 Interview Portal</div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item" href="preparation.html" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item active" href="userstats.html" title="User Stats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="leaderboard.html" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="settings.html" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page-pill">Performance Dashboard</div>
    
    <div class="dashboard-container">
      <div class="profile-card">
        <div class="profile-big-avatar" id="statBigAvatar">--</div>
        <h2 class="profile-name" id="statName">--</h2>
        <span class="profile-degree" id="statDegree">--</span>
        
        <div class="profile-meta-list">
          <div class="profile-meta-item">
            <span class="meta-label">Role</span>
            <span class="meta-value" id="statRole">--</span>
          </div>
          <div class="profile-meta-item">
            <span class="meta-label">Age</span>
            <span class="meta-value" id="statAge">--</span>
          </div>
          <div class="profile-meta-item">
            <span class="meta-label">Gender</span>
            <span class="meta-value" id="statGender">--</span>
          </div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-title">Total Attempts</span>
            <div class="metric-icon-wrap">📝</div>
          </div>
          <div class="metric-value" id="statAttempts">0</div>
          <div class="metric-sub">Completed modules</div>
        </div>

        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-title">Highest Score</span>
            <div class="metric-icon-wrap">🏆</div>
          </div>
          <div class="metric-value-small" id="statHighest">0/100</div>
          <div class="metric-sub">Best evaluation achieved</div>
        </div>

        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-title">Avg Score</span>
            <div class="metric-icon-wrap">📈</div>
          </div>
          <div class="metric-value-small" id="statAverage">0/100</div>
          <div class="metric-sub">Mean runtime rating</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // 1. Core DOM Element Selectors
  const navName = document.getElementById("navName");
  const navAvatar = document.getElementById("navAvatar");
  
  const statBigAvatar = document.getElementById("statBigAvatar");
  const statName = document.getElementById("statName");
  const statDegree = document.getElementById("statDegree");
  const statRole = document.getElementById("statRole"); // Selector for Role row
  const statAge = document.getElementById("statAge");
  const statGender = document.getElementById("statGender");
  
  const statAttempts = document.getElementById("statAttempts");
  const statHighest = document.getElementById("statHighest");
  const statAverage = document.getElementById("statAverage");

  // 2. Local Fallback metrics object
  const localFallbacks = {
    degree: "B.Tech Computer Science",
    role: "Candidate",
    age: 21,
    gender: "Male",
    totalAttempts: 12,
    highestScore: "94/100",
    avgScore: "82.5/100"
  };

  // 3. UI rendering logic mapping variables from API object
  function populateUI(user) {
    // Top Navigation updates
    navName.innerText = user.fullname;
    if (user.profileImageURL) {
      navAvatar.innerHTML = `<img src="${user.profileImageURL}" alt="User">`;
      statBigAvatar.innerHTML = `<img src="${user.profileImageURL}" alt="User">`;
    } else if (user.fullname) {
      const initials = user.fullname.split(" ").map(n => n[0]).join("").toUpperCase();
      navAvatar.innerText = initials;
      statBigAvatar.innerText = initials;
    }

    // Details Grid Layout Assignments
    statName.innerText = user.fullname;
    statDegree.innerText = user.degree || "Not Specified";
    statAge.innerText = user.age || "--";
    statGender.innerText = user.gender || "--";
    
    // Dynamic Right Metrics Grid Cards
    statAttempts.innerText = user.totalAttempts ?? localFallbacks.totalAttempts;
    statHighest.innerText = user.highestScore || localFallbacks.highestScore;
    statAverage.innerText = user.avgScore || localFallbacks.avgScore;
  }

  // 4. Executing real-time API call
  fetch("/api/current-user")
    .then(res => {
      if (!res.ok) throw new Error("API Connection Failed");
      return res.json();
    })
    .then(apiUser => {
      console.log("Profile data loaded successfully from API:", apiUser);
      populateUI(apiUser);
    })
    .catch(err => {
      console.warn("Using local fallback structure:", err.message);
      // Hardcoded profile backup structure for layout testing
      populateUI({
        fullname: "Dhruvil Shah",
        profileImageURL: "",
        ...localFallbacks
      });
    });
</script>
</body>
</html>
