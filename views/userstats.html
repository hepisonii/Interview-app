<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Stats – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-dark: #0f172a;
      --primary-dark-hover: #1e293b;
      --bg-main: #f8f8f6;
      --surface: #ffffff;
      --border-color: #e4e4e0;
      --text-dark: #0f172a;
      --text-mid: #6b7280;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 80px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.02);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 30px; padding: 4px 14px 4px 4px;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0; border: 1px solid #e5e7eb;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 800; color: var(--primary-dark);
      letter-spacing: 0.05em;
      display: flex; align-items: center; gap: 8px;
      text-transform: uppercase;
    }
    .nav-logo-icon {
      background: var(--primary-dark); color: #fff;
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon i { color: #fff; font-size: 12px; }

    /* ── LAYOUT ── */
    .layout { display: flex; padding-top: var(--nav-h); min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed; top: var(--nav-h); left: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 0;
      background: var(--surface);
      border-right: 1px solid var(--border-color);
      z-index: 50;
    }
    .nav-items { display: flex; flex-direction: column; gap: 8px; flex: 1; width: 100%; align-items: center; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      width: 64px; height: 64px; border-radius: 12px;
      text-decoration: none; color: var(--text-muted);
      transition: all 0.2s ease;
    }
    .nav-item:hover { background-color: #f3f4f6; color: var(--text-dark); }
    .nav-item.active { background-color: var(--primary-dark); color: #ffffff; }
    .nav-icon { font-size: 18px; line-height: 1; }
    .nav-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .nav-item.active .nav-label { color: #ffffff; }
    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 16px; border-top: 1px solid var(--border-color); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; padding: 40px 24px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }

    /* ── PROFILE CARD ── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      box-shadow: 0 2px 24px rgba(0,0,0,0.05);
    }
    .pc-left { display: flex; align-items: center; gap: 18px; }
    .pc-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
      font-size: 22px;
    }
    .pc-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .pc-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 300;
      color: var(--text-dark);
      letter-spacing: -0.01em; line-height: 1.1;
    }
    .pc-creds {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--text-muted);
      margin-top: 5px;
    }
    .pc-right { display: flex; gap: 28px; align-items: center; }
    .demo-item { display: flex; flex-direction: column; gap: 3px; text-align: right; }
    .demo-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .demo-val { font-size: 13px; font-weight: 500; color: var(--text-dark); }
    .demo-divider { width: 1px; height: 28px; background: var(--border-color); }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 18px 24px;
      display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end;
      box-shadow: 0 2px 24px rgba(0,0,0,0.04);
    }
    .flt-group { display: flex; flex-direction: column; gap: 7px; flex: 1; min-width: 180px; }
    .flt-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .seg {
      display: flex; gap: 3px;
      background: var(--bg-main);
      border-radius: 10px; padding: 3px;
      border: 1px solid var(--border-color);
    }
    .seg-btn {
      flex: 1; padding: 8px 12px;
      border: none; background: none;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--text-muted);
      cursor: pointer; transition: all .15s;
      letter-spacing: 0.04em; text-align: center;
    }
    .seg-btn:hover { background: var(--surface); color: var(--text-dark); }
    .seg-btn.sel {
      background: var(--primary-dark);
      color: #ffffff;
      border-radius: 7px;
    }

    /* ── METRIC CARDS ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .mcard {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 28px 24px 24px;
      display: flex; flex-direction: column; gap: 8px;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 24px rgba(0,0,0,0.05);
      transition: box-shadow .2s;
    }
    .mcard:hover { box-shadow: 0 4px 32px rgba(0,0,0,0.09); }
    .mcard::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--border-color);
    }
    .mcard.lead::before { background: var(--primary-dark); }
    .m-icon {
      font-size: 16px; color: var(--text-muted);
      margin-bottom: 2px;
    }
    .m-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .m-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px; font-weight: 300;
      color: var(--text-dark);
      line-height: 1; letter-spacing: -0.02em;
      transition: opacity .2s, transform .2s;
    }
    .m-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text-muted);
      margin-top: 2px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">U</div>
      <span class="user-name-nav" id="navName">Candidate Ledger</span>
    </div>
  </div>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-target"></i></div>
    <span>Interview Portal</span>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item" href="/interview/preparation" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item active" title="User Stats" href="">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="/settings" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="container">

      <!-- Profile Card -->
      <div class="profile-card">
        <div class="pc-left">
          <div class="pc-avatar" id="profileAvatar">👤</div>
          <div>
            <div class="pc-name" id="profileFullname">Loading Ledger...</div>
            <div class="pc-creds" id="profileQualifications">System verification pending</div>
          </div>
        </div>
        <div class="pc-right">
          <div class="demo-item">
            <span class="demo-lbl">Age Group</span>
            <span class="demo-val" id="profileAge">--</span>
          </div>
          <div class="demo-divider"></div>
          <div class="demo-item">
            <span class="demo-lbl">Gender</span>
            <span class="demo-val" id="profileGender">--</span>
          </div>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="flt-group">
          <span class="flt-label">Evaluation Track</span>
          <div class="seg" role="group">
            <button class="seg-btn sel" data-track="frontend" onclick="setTrack(this)">Frontend</button>
            <button class="seg-btn" data-track="backend" onclick="setTrack(this)">Backend</button>
            <button class="seg-btn" data-track="cybersecurity" onclick="setTrack(this)">Cyber</button>
          </div>
        </div>
        <div class="flt-group">
          <span class="flt-label">Target Difficulty</span>
          <div class="seg" role="group">
            <button class="seg-btn sel" data-diff="easy" onclick="setDiff(this)">Easy</button>
            <button class="seg-btn" data-diff="medium" onclick="setDiff(this)">Medium</button>
            <button class="seg-btn" data-diff="hard" onclick="setDiff(this)">Hard</button>
          </div>
        </div>
      </div>

      <!-- Metric Cards -->
      <div class="metrics-grid">
        <div class="mcard lead">
          <i class="ti ti-clipboard-list m-icon" aria-hidden="true"></i>
          <span class="m-lbl">Evaluations Attempted</span>
          <span class="m-val" id="mAttempts">0</span>
          <span class="m-sub">total sessions</span>
        </div>
        <div class="mcard">
          <i class="ti ti-trophy m-icon" aria-hidden="true"></i>
          <span class="m-lbl">Highest Rank Score</span>
          <span class="m-val" id="mHighest">—</span>
          <span class="m-sub">best result</span>
        </div>
        <div class="mcard">
          <i class="ti ti-chart-line m-icon" aria-hidden="true"></i>
          <span class="m-lbl">Average Delta Mean</span>
          <span class="m-val" id="mAverage">—</span>
          <span class="m-sub">overall average</span>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
  let currentRole = "frontend";
  let currentDifficulty = "easy";
  let profileLoaded = false;

  function setTrack(btn) {
    document.querySelectorAll('[data-track]').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    currentRole = btn.dataset.track;
    triggerMetricsSync();
  }

  function setDiff(btn) {
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    currentDifficulty = btn.dataset.diff;
    triggerMetricsSync();
  }

  function animateVal(el, val) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(6px)';
    setTimeout(() => {
      el.textContent = val;
      el.style.transition = 'opacity .25s ease, transform .25s ease';
      el.style.opacity = '1';
      el.style.transform = 'none';
    }, 80);
  }

  function populateProfile(user) {
    if (!user) return;
    document.getElementById("navName").innerText = user.fullname || "User";
    document.getElementById("profileFullname").innerText = user.fullname || "Anonymous Profile";
    document.getElementById("profileQualifications").innerText = user.qualifications || "Candidate Practitioner";
    document.getElementById("profileAge").innerText = user.age || "Unspecified";
    document.getElementById("profileGender").innerText = user.gender || "Unspecified";
    if (user.profileImageURL) {
      const stamp = `<img src="${user.profileImageURL}">`;
      document.getElementById("navAvatar").innerHTML = stamp;
      document.getElementById("profileAvatar").innerHTML = stamp;
    }
  }

  function populateMetrics(data) {
    animateVal(document.getElementById("mAttempts"), data.totalattempts !== undefined ? data.totalattempts : 0);
    animateVal(document.getElementById("mHighest"), data.highestScore || "0/100");
    animateVal(document.getElementById("mAverage"), data.averageScore || "0/100");
  }

  async function triggerMetricsSync() {
    try {
      const url = `${window.location.pathname}/fetch?role=${currentRole}&difficulty=${currentDifficulty}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("API stream severed");
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      if (!profileLoaded) { populateProfile(data.user); profileLoaded = true; }
      populateMetrics(data);
    } catch (err) {
      console.warn("Metrics sync warning:", err.message);
      if (!profileLoaded) {
        populateProfile({ fullname: "Candidate Practitioner", qualifications: "B.Tech Analytics Track", age: 22, gender: "Verified" });
        profileLoaded = true;
      }
      populateMetrics({ totalattempts: 0, highestScore: "0/100", averageScore: "0/100" });
    }
  }

  triggerMetricsSync();
</script>
</body>
</html>
