<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preparation – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --surface: rgba(255,255,255,0.44);
      --border: rgba(255,255,255,0.72);
      --text-dark: #1e1b4b;
      --text-mid: #4b5563;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 72px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #c9d6ff 0%, #e8e8f0 45%, #fce4ec 100%);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: #a5b4fc;
      top: -160px; left: -120px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 440px; height: 440px;
      background: #fbcfe8;
      bottom: -130px; right: -90px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift { to { transform: translate(30px, 25px) scale(1.07); } }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,0.60);
      box-shadow: 0 2px 24px rgba(100,100,200,0.10);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(199,210,254,0.8);
      border-radius: 40px;
      padding: 5px 16px 5px 5px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 800; color: var(--indigo);
      letter-spacing: 0.04em;
      background: rgba(129,140,248,0.12);
      border: 1px solid rgba(129,140,248,0.28);
      border-radius: 22px;
      padding: 5px 14px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
      position: relative; z-index: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 0 24px;
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-right: 1px solid rgba(255,255,255,0.60);
      z-index: 50;
      gap: 6px;
    }
    .nav-items { display: flex; flex-direction: column; gap: 6px; flex: 1; width: 100%; align-items: center; }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 52px; height: 52px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.22s;
      text-decoration: none;
      border: 1.5px solid transparent;
      position: relative;
    }
    .nav-item:hover {
      background: rgba(129,140,248,0.12);
      border-color: rgba(129,140,248,0.25);
    }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(129,140,248,0.22), rgba(99,102,241,0.14));
      border-color: rgba(129,140,248,0.45);
      box-shadow: 0 3px 14px rgba(99,102,241,0.14);
    }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label {
      font-size: 9px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-item:hover .nav-label { color: var(--indigo); }
    .nav-item.active .nav-label { color: var(--indigo); }

    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 12px; border-top: 1px solid rgba(199,210,254,0.25); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Interview Card Styles */
    .interview-card {
      background: rgba(255,255,255,0.48);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1.5px solid rgba(255,255,255,0.72);
      border-radius: 28px;
      padding: 48px 44px;
      max-width: 420px;
      box-shadow: 0 8px 48px rgba(99,102,241,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
      animation: cardSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardSlideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      margin-bottom: 36px;
      text-align: center;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .card-subtitle {
      font-size: 15px;
      color: var(--text-mid);
      font-weight: 400;
      line-height: 1.5;
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: rgba(129,140,248,0.08);
      border: 1px solid rgba(129,140,248,0.2);
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .detail-item:hover {
      background: rgba(129,140,248,0.14);
      border-color: rgba(129,140,248,0.35);
      transform: translateX(4px);
    }

    .detail-icon {
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
    }

    .detail-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
    }

    /* Animated Start Button */
    .start-btn {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      color: white;
      border: 2px solid transparent;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
      letter-spacing: 0.03em;
      background-clip: padding-box;
    }

    .start-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(99,102,241,0.6);
    }

    .start-btn:active {
      transform: translateY(-2px);
    }

    .btn-text {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-text::after {
      content: '→';
      transition: transform 0.3s ease;
      display: inline-block;
    }

    .start-btn:hover .btn-text::after {
      transform: translateX(4px);
    }

    /* Animated glowing border - the moving light train */
    .btn-glow {
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      padding: 2px;
      background: linear-gradient(
        90deg,
        #6366f1,
        #818cf8,
        #a78bfa,
        #818cf8,
        #6366f1
      );
      background-size: 200% 100%;
      animation: trainRun 3s linear infinite;
      -moz-animation: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes trainRun {
      0% {
        background-position: 0% center;
      }
      100% {
        background-position: 200% center;
      }
    }

    .start-btn:hover .btn-glow {
      animation: trainRun 1.5s linear infinite;
      background: linear-gradient(
        90deg,
        #6366f1,
        #c4b5fd,
        #a78bfa,
        #c4b5fd,
        #6366f1
      );
    }

    /* Inner glow effect */
    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 70%);
      z-index: 2;
      animation: innerPulse 2s ease-in-out infinite;
    }

    @keyframes innerPulse {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 0.6;
      }
    }

    /* Outer glow shadow */
    .start-btn::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 16px;
      background: radial-gradient(circle, rgba(129,140,248,0.3) 0%, transparent 70%);
      z-index: -1;
      filter: blur(8px);
      animation: outerGlowPulse 2.5s ease-in-out infinite;
    }

    @keyframes outerGlowPulse {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 0.8;
      }
    }

    /* Form styling */
    form {
      width: 100%;
    }

    .empty-state {
      text-align: center;
      max-width: 380px;
    }
    .empty-icon { font-size: 72px; margin-bottom: 20px; display: block; }
    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      color: var(--text-dark); margin-bottom: 10px;
    }
    .empty-sub { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

    /* page label pill */
    .page-pill {
      display: inline-block;
      background: rgba(129,140,248,0.13);
      border: 1px solid rgba(129,140,248,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px; font-weight: 700;
      color: var(--indigo);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar"></div>
      <span class="user-name-nav" id="navName"></span>
    </div>
  </div>
  <div class="nav-logo">🎯 Interview Portal</div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item active" href="/interview/preparation" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item" title="User Stats" id="userStats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="settings.html" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="interview-card">
      <div class="card-header">
        <h2 class="card-title" id="interviewTitle">Frontend Interview</h2>
        <p class="card-subtitle">Ready to showcase your skills?</p>
      </div>
      
      <div class="card-details">
        <div class="detail-item">
          <span class="detail-icon">⏱️</span>
          <div class="detail-content">
            <span class="detail-label">Time</span>
            <span class="detail-value">40 minutes</span>
          </div>
        </div>
        <div class="detail-item">
          <span class="detail-icon">📍</span>
          <div class="detail-content">
            <span class="detail-label">Level</span>
            <span class="detail-value">Easy</span>
          </div>
        </div>
        
        <div class="detail-item">
          <span class="detail-icon">💻</span>
          <div class="detail-content">
            <span class="detail-label">Role</span>
            <span class="detail-value" id="role">Frontend</span>
          </div>
        </div>
      </div>
      
      <form method="post" action="/user/start-interview">
        <button type="submit" class="start-btn" >
          <span class="btn-text">Start Interview</span>
          <span class="btn-glow"></span>
        </button>
      </form>
    </div>
  </main>
</div>

<script>
  const navName = document.getElementById("navName")
  const navAvatar = document.getElementById("navAvatar");
  const role = document.getElementById("role");
  // 2. Variable referencing the header title element
  const interviewTitle = document.getElementById("interviewTitle");

  fetch("/api/current-user")
  .then(res => res.json())
  .then(user => {
    navName.innerText = user.fullname;
    navAvatar.innerHTML = `<img src="${user.profileImageURL}">`;
    role.innerText = user.role;
  })
  .catch(err => {
    // Fallback if API fails
    navName.innerText = "User";
    navAvatar.textContent = "U";
  });
</script>
</body>
</html>
