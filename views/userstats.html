<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Stats – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary-dark: #0f172a;
      --primary-dark-hover: #1e293b;
      --bg-main: #f8f8f6;
      --surface: #ffffff;
      --border-color: #e4e4e0;
      --text-dark: #0f172a;
      --text-mid: #6b7280;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 80px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.02);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 4px 14px 4px 4px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid #e5e7eb;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
    }
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 800; color: var(--primary-dark);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .nav-logo-icon {
      background: var(--primary-dark);
      color: #fff;
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon i { color: #fff; font-size: 12px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── SIDEBAR (Flat styling) ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      background: var(--surface);
      border-right: 1px solid var(--border-color);
      z-index: 50;
    }
    .nav-items { 
      display: flex; flex-direction: column; gap: 8px; flex: 1; width: 100%; align-items: center;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      width: 64px; height: 64px; border-radius: 12px; text-decoration: none; color: var(--text-muted);
      transition: all 0.2s ease;
    }
    .nav-item:hover { background-color: #f3f4f6; color: var(--text-dark); }
    .nav-item.active {
      background-color: var(--primary-dark); color: #ffffff;
    }
    .nav-icon { 
      font-size: 18px; line-height: 1; 
    }
    .nav-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .nav-item.active .nav-label { 
      color: #ffffff; 
    }
    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 16px; border-top: 1px solid var(--border-color); }

    /* ── MAIN CONTENT AREA ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    /* ── PROFILE OVERVIEW HEADER BANNER ── */
    .profile-summary-card {
      background-color: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.25rem;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }

    .meta-user-block {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .p-avatar-box {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: var(--bg-main);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      overflow: hidden;
    }

    .p-avatar-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .p-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 2px;
    }

    .p-credentials {
      font-size: 13px;
      color: var(--text-mid);
    }

    .demographics-grid {
      display: flex;
      gap: 32px;
    }

    .demo-item {
      display: flex;
      flex-direction: column;
    }

    .demo-lbl {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.03em;
    }

    .demo-val {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
    }

    /* ── FILTER MATRICES BAR ── */
    .matrix-filter-bar {
      background-color: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.04);
    }

    .selector-combo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }

    .selector-combo label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .custom-select {
      height: 44px;
      background-color: #f9fafb;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      padding: 0 12px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px 14px;
      padding-right: 40px;
      transition: border-color 0.2s, background 0.2s;
    }
    
    .custom-select:focus {
      border-color: var(--primary-dark);
      background-color: #fff;
    }

    /* ── NUMERIC METRICS BLOCKS GRID ── */
    .stats-4blocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .metric-panel-node {
      background-color: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.25rem 1.75rem;
      text-align: left;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }

    .metric-node-lbl {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .metric-node-val {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">U</div>
      <span class="user-name-nav" id="navName">Candidate Ledger</span>
    </div>
  </div>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-target"></i></div>
    <span>Interview Portal</span>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item" href="/interview/preparation" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item active" title="User Stats" href="">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="/settings" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="container">
      
      <div class="profile-summary-card">
        <div class="meta-user-block">
          <div class="p-avatar-box" id="profileAvatar">👤</div>
          <div>
            <h2 class="p-name" id="profileFullname">Loading Ledger...</h2>
            <p class="p-credentials" id="profileQualifications">System verification pending</p>
          </div>
        </div>
        
        <div class="demographics-grid">
          <div class="demo-item">
            <span class="demo-lbl">Age Group</span>
            <span class="demo-val" id="profileAge">--</span>
          </div>
          <div class="demo-item">
            <span class="demo-lbl">Gender</span>
            <span class="demo-val" id="profileGender">--</span>
          </div>
        </div>
      </div>

      <div class="matrix-filter-bar">
        <div class="selector-combo">
          <label>Evaluation Track</label>
          <select id="trackSelector" class="custom-select">
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="cybersecurity">Cybersecurity</option>
          </select>
        </div>
        
        <div class="selector-combo">
          <label>Target Difficulty</label>
          <select id="diffSelector" class="custom-select">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
      </div>

      <div class="stats-4blocks-grid">
        <div class="metric-panel-node">
          <div class="metric-node-lbl">Evaluations Attempted</div>
          <div class="metric-node-val" id="mAttempts">0</div>
        </div>
        <div class="metric-panel-node">
          <div class="metric-node-lbl">Highest Rank Score</div>
          <div class="metric-node-val" id="mHighest">0%</div>
        </div>
        <div class="metric-panel-node">
          <div class="metric-node-lbl">Average Delta Mean</div>
          <div class="metric-node-val" id="mAverage">0%</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
  let currentRole = "frontend";
  let currentDifficulty = "easy";
  let profileLoaded = false;

  const trackSelector = document.getElementById("trackSelector");
  const diffSelector = document.getElementById("diffSelector");

  // Dynamic Event binding to trigger refresh sequences
  trackSelector.addEventListener("change", (e) => { currentRole = e.target.value; triggerMetricsSync(); });
  diffSelector.addEventListener("change", (e) => { currentDifficulty = e.target.value; triggerMetricsSync(); });

  function populateProfile(user) {
    if (!user) return;
    document.getElementById("navName").innerText = user.fullname || "User";
    document.getElementById("profileFullname").innerText = user.fullname || "Anonymous Profile";
    document.getElementById("profileQualifications").innerText = user.qualifications || "Candidate Practitioner";
    document.getElementById("profileAge").innerText = user.age || "Unspecified";
    document.getElementById("profileGender").innerText = user.gender || "Unspecified";
    
    if (user.profileImageURL) {
      const stamp = `<img src="${user.profileImageURL}">`;
      document.getElementById("navAvatar").innerHTML = stamp;
      document.getElementById("profileAvatar").innerHTML = stamp;
    }
  }

  function populateMetrics(data) {
    document.getElementById("mAttempts").innerText = data.totalattempts !== undefined ? data.totalattempts : 0;
    document.getElementById("mHighest").innerText = data.highestScore || "0/100";
    document.getElementById("mAverage").innerText = data.averageScore || "0/100";
  }

  async function triggerMetricsSync() {
    try {
      const url = `${window.location.pathname}/fetch?role=${currentRole}&difficulty=${currentDifficulty}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("API stream severed fallback cleanly");
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      if (!profileLoaded) {
        populateProfile(data.user);
        profileLoaded = true;
      }
      populateMetrics(data);
    } catch (err) {
      console.warn("Metrics synchronization warning:", err.message);
      // Clean mock state values layout safe guards
      if(!profileLoaded) {
        populateProfile({ fullname: "Candidate Practitioner", qualifications: "B.Tech Analytics Track", age: 22, gender: "Verified" });
        profileLoaded = true;
      }
      populateMetrics({ totalattempts: 0, highestScore: "0/100", averageScore: "0/100" });
    }
  }

  triggerMetricsSync();
</script>
</body>
</html>
