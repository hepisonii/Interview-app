<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary-dark: #0f172a;
      --primary-dark-hover: #1e293b;
      --bg-main: #f8f8f6;
      --surface: #ffffff;
      --border-color: #e4e4e0;
      --text-dark: #0f172a;
      --text-mid: #6b7280;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 80px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.02);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 4px 14px 4px 4px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid #e5e7eb;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
    }
    
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .nav-logo-icon {
      background: var(--primary-dark);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-logo-icon i { color: #fff; font-size: 12px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── SIDEBAR (Flat styling) ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      background: var(--surface);
      border-right: 1px solid var(--border-color);
      z-index: 50;
    }
    .nav-items { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      flex: 1; 
      width: 100%; 
      align-items: center; 
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 64px; height: 64px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: var(--text-muted);
    }
    
    .nav-item:hover {
      background-color: #f3f4f6;
      color: var(--text-dark);
    }
    
    .nav-item.active {
      background-color: var(--primary-dark);
      color: #ffffff;
    }
    
    .nav-icon { 
      font-size: 18px; 
      line-height: 1; 
    }
    
    .nav-label {
      font-size: 9px; 
      font-weight: 700;
      text-transform: uppercase; 
      letter-spacing: 0.05em;
    }
    .nav-item.active .nav-label { 
      color: #ffffff; 
    }

    .sidebar-bottom { 
      width: 100%; 
      display: flex; 
      justify-content: center; 
      padding-top: 16px; 
      border-top: 1px solid var(--border-color); 
    }

    /* ── MAIN CONTENT AREA ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 32px;
    }

    .page-header { margin-bottom: 32px; }
    .page-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 24px;
      line-height: 1.2;
    }

    /* ── Selectors Container ── */
    .selectors-container {
      display: flex;
      gap: 40px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .selector-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .selector-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .selector-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .selector-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #6b7280;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: capitalize;
      font-family: 'DM Sans', sans-serif;
    }
    .selector-btn:hover {
      background: #f3f4f6;
      color: #0f172a;
    }
    .selector-btn.active {
      background: #0f172a;
      border-color: #0f172a;
      color: #ffffff;
      font-weight: 500;
    }

    /* ── Leaderboard grid ── */
    .lb-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 24px;
    }

    /* ── Glass cards ── */
    .lb-card {
      border-radius: 20px;
      padding: 24px 20px 18px;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: default;
      background: #ffffff;
      border: 1px solid #e4e4e0;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }
    .lb-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 30px rgba(0,0,0,0.08);
    }

    .lb-card.gold {
      background: #fefce8;
      border-color: #fef08a;
    }
    .lb-card.silver {
      background: #f9fafb;
      border-color: #e5e7eb;
    }
    .lb-card.bronze {
      background: #fff7ed;
      border-color: #fed7aa;
    }

    /* Rank badge (top-3 only) */
    .rank-badge {
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff;
      border: 2px solid #ffffff;
    }
    .rank-badge.gold { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .rank-badge.silver { background: linear-gradient(135deg,#9ca3af,#6b7280); }
    .rank-badge.bronze { background: linear-gradient(135deg,#d97706,#92400e); }

    /* Card internals */
    .card-top { display: flex; align-items: center; gap: 14px; }
    .av {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600; color: #fff;
      object-fit: cover;
    }
    .gold .av { border: 2px solid #f59e0b; }
    .silver .av { border: 2px solid #9ca3af; }
    .bronze .av { border: 2px solid #d97706; }
    .purple .av { border: 2px solid #e5e7eb; }

    .user-info { flex: 1; min-width: 0; }
    .uname {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px; color: var(--text-dark);
    }
    .udeg {
      font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-mid);
    }

    .score-block { text-align: right; flex-shrink: 0; }
    .sval { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 2px; color: var(--text-dark); }
    .slbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }

    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 14px 0 11px; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-mid); }

    .attempt-pill {
      border-radius: 20px; padding: 2px 10px;
      font-size: 10px; font-weight: 500;
      background: #f3f4f6; color: var(--text-mid);
      border: 1px solid #e5e7eb;
    }

    .lb-loading { text-align: center; padding: 60px 0; color: var(--text-mid); font-size: 14px; }

    @media (max-width: 1200px) {
      .lb-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    @media (max-width: 768px) {
      .lb-grid { grid-template-columns: 1fr; }
      .main { padding: 28px 20px; }
      .page-title { font-size: 24px; }
      .selectors-container { flex-direction: column; gap: 20px; }
    }
  </style>
</head>
<body>

  </main>
</div>

  let currentRole = "backend";     // Default role
  let currentDifficulty = "easy";   // Default difficulty

  const navName = document.getElementById("navName");
  const navAvatar = document.getElementById("navAvatar");
  fetch("/api/current-user")
  .then(res => res.json())
  .then(user => {
    if(Object.keys(user).length){
      navName.innerText = user.fullname;
      navAvatar.innerHTML = `<img src=${user.profileImageURL}>`;
      const link = document.getElementById("userStats");
      link.href = `/stats/${user._id}`;

    else{
      const loginCheck = document.getElementById("loginCheck");

  .catch(() => {
    navName.innerText = "Guest User";
  });

  function initializeRoleButtons() {
    const roleButtons = document.getElementById("roleButtons");
    const roles = ["backend", "frontend", "cybersecurity"];
    
    roles.forEach(role => {
      const btn = document.createElement("button");
      btn.className = `selector-btn ${role === currentRole ? 'active' : ''}`;
      btn.textContent = role.charAt(0).toUpperCase() + role.slice(1);
      btn.onclick = () => switchRole(role);
      roleButtons.appendChild(btn);
    });
  }

  function initializeDifficultyButtons() {
    const difficultyButtons = document.getElementById("difficultyButtons");
    const difficulties = ["easy", "medium", "hard"];
    
    difficulties.forEach(difficulty => {
      const btn = document.createElement("button");
      btn.className = `selector-btn ${difficulty === currentDifficulty ? 'active' : ''}`;
      btn.textContent = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
      btn.onclick = () => switchDifficulty(difficulty);
      difficultyButtons.appendChild(btn);
    });
  }

  function switchRole(role) {
    currentRole = role;
    updateButtonStates('role', role);
    loadLeaderboard(currentRole, currentDifficulty);
  }

  function switchDifficulty(difficulty) {
    currentDifficulty = difficulty;
    updateButtonStates('difficulty', difficulty);
    loadLeaderboard(currentRole, currentDifficulty);
  }

  function updateButtonStates(type, selected) {
    if (type === 'role') {
      const buttons = document.querySelectorAll('#roleButtons .selector-btn');
      buttons.forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase() === selected.toLowerCase()) {
          btn.classList.add('active');
        }
      });
    } else if (type === 'difficulty') {
      const buttons = document.querySelectorAll('#difficultyButtons .selector-btn');
      buttons.forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase() === selected.toLowerCase()) {
          btn.classList.add('active');
        }
      });
    }
  }

  const rankLabel = i => ["1st","2nd","3rd"][i] || `#${i+1}`;
  const medal     = i => ["🥇","🥈","🥉"][i] || "🎯";
  const initials  = n => n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const avatarColors = ["#0f172a","#1e293b","#334155","#475569","#64748b","#6b7280","#9ca3af","#e2e8f0"];
  
  function renderCards(users) {
    const grid = document.getElementById("lbGrid");
    grid.innerHTML = "";
    if (!users || users.length === 0) {
      grid.innerHTML = `<div class="lb-loading" style="grid-column:1/-1">No results yet. Be the first to attempt!</div>`;
      return;
    }
    users.forEach((u, i) => {
      const t      = tierClass(i);
      const isTop3 = i < 3;
      const color  = avatarColors[i % avatarColors.length];
      const card   = document.createElement("div");
      card.className = `lb-card ${t}`;
      
      const avatarEl = u.profileImageURL
        ? `<img class="av" src="${u.profileImageURL}" alt="${u.fullname}" style="border-radius:50%;width:52px;height:52px;object-fit:cover;">`
        : `<div class="av" style="background:${color};color:#fff;">${initials(u.fullname)}</div>`;
      card.innerHTML = `
      <a href = '/stats/${u._id}' style="text-decoration:none">
        ${isTop3 ? `<div class="rank-badge ${t}">${rankLabel(i)}</div>` : ""}
        <div class="card-top" style="margin-top:${isTop3?"8px":"0"}">
          ${avatarEl}
          <div class="user-info">
            <div class="uname">${u.fullname}</div>
            <div class="udeg">${u.qualifications || "—"}</div>
          </div>
          <div class="score-block">
            <div class="sval">${u.highestScore}</div>
            <div class="slbl">score</div>
          </div>
        </div>
        <hr class="divider">
        <div class="card-footer">
          <span>${medal(i)} Rank ${rankLabel(i)}</span>
          <span class="attempt-pill">Attempt ${u.attempt_no}</span>
        </div>
        </a>
      `;
      grid.appendChild(card);
    });
  }

  async function loadLeaderboard(role = "backend", difficulty = "easy") {
    try {
      const response = await fetch(`/leaderboard?role=${role}&difficulty=${difficulty}`);
      if (!response.ok) throw new Error('Failed to fetch leaderboard');
      const result = await response.json();
      if (!result.success) throw new Error(result.message);
      let users = result.data;
      users.sort((a, b) => b.highestScore - a.highestScore);
      renderCards(users);
    } catch (error) {
      console.error('Error loading leaderboard:', error);
      const grid = document.getElementById("lbGrid");
      grid.innerHTML = `<div class="lb-loading" style="grid-column:1/-1; color: #dc2626;">Failed to load leaderboard. Please try again later.</div>`;
    }
  }

  initializeRoleButtons();
  initializeDifficultyButtons();
  loadLeaderboard(currentRole, currentDifficulty);
</script>
</body>
</html>
