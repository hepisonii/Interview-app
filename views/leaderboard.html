<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366f1;
      --nav-h: 68px;
      --sidebar-w: 72px;
      --bg-light: #f8f7f4;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8f7f4 0%, #f3f0eb 100%);
      overflow-x: hidden;
      position: relative;
      color: var(--text-primary);
    }

    /* ── Floating orbs background ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }
    .orb-1  { width:320px; height:320px; background: radial-gradient(circle, rgba(99,102,241,0.15), rgba(99,102,241,0.05)); top:-100px; left:-80px; animation: float1 10s ease-in-out infinite alternate; opacity:0.8; }
    .orb-2  { width:280px; height:280px; background: radial-gradient(circle, rgba(168,85,247,0.12), rgba(168,85,247,0.04)); top:80px; right:120px; animation: float2 13s ease-in-out infinite alternate; opacity:0.75; }
    .orb-3  { width:250px; height:250px; background: radial-gradient(circle, rgba(59,130,246,0.14), rgba(59,130,246,0.04)); bottom:200px; left:40px; animation: float3 11s ease-in-out infinite alternate; opacity:0.7; }
    .orb-4  { width:300px; height:300px; background: radial-gradient(circle, rgba(236,72,153,0.10), rgba(236,72,153,0.03)); bottom:-80px; right:-60px; animation: float1 14s ease-in-out infinite alternate-reverse; opacity:0.72; }
    .orb-5  { width:200px; height:200px; background: radial-gradient(circle, rgba(34,211,238,0.13), rgba(34,211,238,0.03)); top:45%; left:55%; animation: float2 9s ease-in-out infinite alternate; opacity:0.68; }
    .orb-6  { width:180px; height:180px; background: radial-gradient(circle, rgba(249,115,22,0.11), rgba(249,115,22,0.03)); top:30%; right:8%; animation: float3 12s ease-in-out infinite alternate-reverse; opacity:0.7; }
    .orb-7  { width:160px; height:160px; background: radial-gradient(circle, rgba(168,85,247,0.12), rgba(34,211,238,0.05)); bottom:30%; left:30%; animation: float1 15s ease-in-out infinite alternate; opacity:0.65; }

    @keyframes float1 { to { transform: translate(28px, 22px) scale(1.06); } }
    @keyframes float2 { to { transform: translate(-22px, 30px) scale(1.08); } }
    @keyframes float3 { to { transform: translate(18px, -25px) scale(1.05); } }

    /* ── Floating emoji decorations ── */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 42px;
      opacity: 0.12;
      filter: blur(0.5px);
      animation: decoFloat 14s ease-in-out infinite alternate;
    }
    .deco:nth-child(1)  { top:12%;  left:8%;   font-size:52px; animation-duration:11s; opacity:0.14; }
    .deco:nth-child(2)  { top:20%;  right:12%; font-size:38px; animation-duration:13s; animation-direction:alternate-reverse; }
    .deco:nth-child(3)  { top:55%;  left:5%;   font-size:34px; animation-duration:16s; opacity:0.12; }
    .deco:nth-child(4)  { bottom:18%; right:6%; font-size:48px; animation-duration:10s; opacity:0.14; }
    .deco:nth-child(5)  { bottom:40%; left:48%; font-size:30px; animation-duration:12s; opacity:0.14; }
    .deco:nth-child(6)  { top:70%;  right:30%; font-size:36px; animation-duration:9s;  opacity:0.12; }
    @keyframes decoFloat { to { transform: translateY(-18px) rotate(12deg); } }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top:0; left:0; right:0;
      height: var(--nav-h); z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 28px;
      background: rgba(248,247,244,0.60);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(99,102,241,0.12);
    }
    .user-chip {
      display:flex; align-items:center; gap:10px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.20);
      border-radius:40px; padding:5px 16px 5px 5px;
    }
    .user-avatar {
      width:36px; height:36px; border-radius:50%;
      background: linear-gradient(135deg,#6366f1,#3b82f6);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:#fff;
      overflow:hidden; flex-shrink:0;
    }
    .user-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .user-name-nav { font-size:13px; font-weight:600; color: var(--text-primary); }
    .nav-logo {
      font-family:'Syne',sans-serif; font-size:14px; font-weight:800;
      color:#6366f1; letter-spacing:0.04em;
      background: rgba(99,102,241,0.10);
      border:1px solid rgba(99,102,241,0.25);
      border-radius:22px; padding:5px 14px;
    }

    /* ── Layout ── */
    .layout { display:flex; padding-top:var(--nav-h); min-height:100vh; position:relative; z-index:1; }

    /* ── Sidebar ── */
    .sidebar {
      width:var(--sidebar-w); position:fixed; top:var(--nav-h); left:0; bottom:0;
      display:flex; flex-direction:column; align-items:center;
      padding:32px 0 24px;
      background: rgba(248,247,244,0.50);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right:1px solid rgba(99,102,241,0.12);
      z-index:50; gap:6px;
    }
    .nav-items { display:flex; flex-direction:column; gap:6px; flex:1; width:100%; align-items:center; }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; width:52px; height:52px; border-radius:14px; cursor:pointer;
      transition:all 0.22s; text-decoration:none; border:1px solid transparent;
    }
    .nav-item:hover { background:rgba(99,102,241,0.12); border-color:rgba(99,102,241,0.25); }
    .nav-item.active {
      background: rgba(99,102,241,0.16);
      border-color:rgba(99,102,241,0.40);
      box-shadow:0 0 18px rgba(99,102,241,0.20);
    }
    .nav-icon  { font-size:22px; line-height:1; }
    .nav-label { font-size:9px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.04em; transition:color 0.2s; }
    .nav-item:hover .nav-label, .nav-item.active .nav-label { color:#6366f1; }
    .sidebar-bottom { width:100%; display:flex; justify-content:center; padding-top:12px; border-top:1px solid rgba(99,102,241,0.12); }

    /* ── Main ── */
    .main { margin-left:var(--sidebar-w); flex:1; padding:40px 32px; animation:fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    .page-header { margin-bottom:32px; }
    .page-pill {
      display:inline-block;
      background:rgba(99,102,241,0.12); border:1px solid rgba(99,102,241,0.25);
      border-radius:20px; padding:4px 14px;
      font-size:11px; font-weight:700; color:#6366f1;
      text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;
    }
    .page-title { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color: var(--text-primary); margin-bottom:24px; }

    /* ── Role Selector ── */
    .role-selector {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .role-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .role-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .role-btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: 1.5px solid rgba(99,102,241,0.30);
      background: rgba(99,102,241,0.08);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: capitalize;
    }
    .role-btn:hover {
      background: rgba(99,102,241,0.12);
      border-color: rgba(99,102,241,0.50);
      transform: translateY(-2px);
    }
    .role-btn.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(99,102,241,0.15));
      border-color: #6366f1;
      color: #6366f1;
      font-weight: 700;
      box-shadow: 0 0 16px rgba(99,102,241,0.25);
    }

    /* ── Leaderboard grid ── */
    .lb-grid {
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:24px;
    }

    /* ── Glass cards ── */
    .lb-card {
      border-radius:22px;
      padding:24px 20px 18px;
      position:relative;
      transition:transform 0.25s, box-shadow 0.25s, background 0.25s;
      cursor:default;
      backdrop-filter: blur(16px) saturate(200%);
      -webkit-backdrop-filter: blur(16px) saturate(200%);
    }
    .lb-card:hover {
      transform:translateY(-6px);
      box-shadow:0 12px 28px rgba(0,0,0,0.12);
    }

    .lb-card.gold {
      background: rgba(251,191,36,0.12);
      border:1.5px solid rgba(251,191,36,0.35);
      box-shadow: 0 4px 16px rgba(251,191,36,0.15), inset 0 1px 0 rgba(255,255,255,0.60);

    }
    .lb-card.gold:hover {
      background: rgba(251,191,36,0.16);
      box-shadow: 0 12px 28px rgba(251,191,36,0.20), inset 0 1px 0 rgba(255,255,255,0.70);
    }

    .lb-card.silver {
      background: rgba(107,114,128,0.08);
      border:1.5px solid rgba(107,114,128,0.25);
      box-shadow: 0 4px 16px rgba(107,114,128,0.12), inset 0 1px 0 rgba(255,255,255,0.60);
    }
    .lb-card.silver:hover {
      background: rgba(107,114,128,0.12);
      box-shadow: 0 12px 28px rgba(107,114,128,0.16), inset 0 1px 0 rgba(255,255,255,0.70);
    }

    .lb-card.bronze {
      background: rgba(217,119,6,0.12);
      border:1.5px solid rgba(217,119,6,0.30);
      box-shadow: 0 4px 16px rgba(217,119,6,0.14), inset 0 1px 0 rgba(255,255,255,0.60);
    }
    .lb-card.bronze:hover {
      background: rgba(217,119,6,0.16);
      box-shadow: 0 12px 28px rgba(217,119,6,0.18), inset 0 1px 0 rgba(255,255,255,0.70);
    }

    .lb-card.purple {
      background: rgba(99,102,241,0.10);
      border:1.5px solid rgba(99,102,241,0.30);
      box-shadow: 0 4px 16px rgba(99,102,241,0.12), inset 0 1px 0 rgba(255,255,255,0.60);
    }
    .lb-card.purple:hover {
      background: rgba(99,102,241,0.14);
      box-shadow: 0 12px 28px rgba(99,102,241,0.16), inset 0 1px 0 rgba(255,255,255,0.70);
    }

    /* ── Rank badge (top-3 only) ── */
    .rank-badge {
      position:absolute; top:-13px; left:50%; transform:translateX(-50%);
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700; color:#fff;
      border:2px solid rgba(255,255,255,0.60);
    }
    .rank-badge.gold   { background:linear-gradient(135deg,#f59e0b,#d97706); box-shadow:0 0 12px rgba(245,158,11,0.5); }
    .rank-badge.silver { background:linear-gradient(135deg,#9ca3af,#6b7280); box-shadow:0 0 12px rgba(156,163,175,0.5); }
    .rank-badge.bronze { background:linear-gradient(135deg,#d97706,#92400e); box-shadow:0 0 12px rgba(217,119,6,0.5); }

    /* ── Card internals ── */
    .card-top { display:flex; align-items:center; gap:14px; }
    .av {
      width:54px; height:54px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; font-weight:700; color:#fff;
      object-fit:cover;
    }
    .gold   .av { border:2.5px solid rgba(251,191,36,0.60); box-shadow:0 0 14px rgba(251,191,36,0.30); }
    .silver .av { border:2.5px solid rgba(107,114,128,0.50); box-shadow:0 0 14px rgba(107,114,128,0.20); }
    .bronze .av { border:2.5px solid rgba(217,119,6,0.60); box-shadow:0 0 14px rgba(217,119,6,0.25); }
    .purple .av { border:2.5px solid rgba(99,102,241,0.50); box-shadow:0 0 14px rgba(99,102,241,0.20); }

    .user-info { flex:1; min-width:0; }
    .uname {
      font-size:15px; font-weight:700;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:3px; color: var(--text-primary);
    }
    .udeg {
      font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      color: var(--text-secondary);
    }
    .gold   .udeg { color:#b45309; }
    .silver .udeg { color:#6b7280; }
    .bronze .udeg { color:#92400e; }
    .purple .udeg { color:#4f46e5; }

    .score-block { text-align:right; flex-shrink:0; }
    .sval { font-size:26px; font-weight:800; line-height:1; margin-bottom:2px; }
    .gold   .sval { color:#b45309; text-shadow:0 0 8px rgba(251,191,36,0.30); }
    .silver .sval { color:#6b7280; text-shadow:0 0 8px rgba(107,114,128,0.20); }
    .bronze .sval { color:#d97706; text-shadow:0 0 8px rgba(217,119,6,0.25); }
    .purple .sval { color:#6366f1; text-shadow:0 0 8px rgba(99,102,241,0.25); }
    .slbl { font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color: var(--text-secondary); }

    .divider { border:none; border-top:1px solid rgba(99,102,241,0.15); margin:14px 0 11px; }

    .card-footer { display:flex; justify-content:space-between; align-items:center; font-size:12px; color: var(--text-secondary); }

    .attempt-pill {
      border-radius:20px; padding:3px 11px;
      font-size:11px; font-weight:600;
    }
    .gold   .attempt-pill { background:rgba(251,191,36,0.15); color:#b45309; border:1px solid rgba(251,191,36,0.30); }
    .silver .attempt-pill { background:rgba(107,114,128,0.12); color:#6b7280; border:1px solid rgba(107,114,128,0.25); }
    .bronze .attempt-pill { background:rgba(217,119,6,0.15); color:#92400e; border:1px solid rgba(217,119,6,0.30); }
    .purple .attempt-pill { background:rgba(99,102,241,0.12); color:#6366f1; border:1px solid rgba(99,102,241,0.25); }

    .lb-loading { text-align:center; padding:60px 0; color: var(--text-secondary); font-size:14px; }

    @media (max-width: 1200px) {
      .lb-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
    }

    @media (max-width: 768px) {
      .lb-grid { grid-template-columns:1fr; }
      .main { padding:28px 20px; }
      .page-title { font-size:24px; }
      .role-selector { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- Floating orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>
<div class="orb orb-5"></div>
<div class="orb orb-6"></div>
<div class="orb orb-7"></div>

<!-- Floating leaderboard decorations -->
<div class="deco">🏆</div>
<div class="deco">🥇</div>
<div class="deco">🎯</div>
<div class="deco">🥈</div>
<div class="deco">⭐</div>
<div class="deco">🥉</div>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar"></div>
      <span class="user-name-nav" id="navName"></span>
    </div>
  </div>
  <div class="nav-logo">🎯 Interview Portal</div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items" id="loginCheck">
      <a class="nav-item" href="/interview/preparation" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item" title="User Stats" id="userStats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item active" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item" href="/settings" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-pill">Leaderboard</div>
      <h2 class="page-title">Top Performers</h2>
      
      <!-- Role Selector -->
      <div class="role-selector">
        <span class="role-label">Select Role:</span>
        <div class="role-buttons" id="roleButtons"></div>
      </div>
    </div>

    <div class="lb-grid" id="lbGrid">
      <div class="lb-loading" style="grid-column:1/-1">Loading rankings…</div>
    </div>
  </main>
</div>

<script>
  /* ── Dummy Data for all roles ── */
  const dummyData = {
    frontend: [
      { _id: "1", fullname: "Raj Kumar", qualifications: "B.Tech CSE", highestScore: 92, attempt_no: 3, profileImageURL: null },
      { _id: "2", fullname: "Priya Singh", qualifications: "B.Tech IT", highestScore: 89, attempt_no: 2, profileImageURL: null },
      { _id: "3", fullname: "Arjun Patel", qualifications: "M.Tech", highestScore: 88, attempt_no: 4, profileImageURL: null },
      { _id: "4", fullname: "Sneha Sharma", qualifications: "B.Tech CSE", highestScore: 85, attempt_no: 2, profileImageURL: null },
      { _id: "5", fullname: "Vikram Desai", qualifications: "B.Tech", highestScore: 81, attempt_no: 1, profileImageURL: null },
    ],
    backend: [
      { _id: "6", fullname: "Aisha Khan", qualifications: "B.Tech CSE", highestScore: 93, attempt_no: 2, profileImageURL: null },
      { _id: "7", fullname: "Rohan Gupta", qualifications: "B.Tech IT", highestScore: 90, attempt_no: 3, profileImageURL: null },
      { _id: "8", fullname: "Zara Malik", qualifications: "Diploma", highestScore: 87, attempt_no: 2, profileImageURL: null },
      { _id: "9", fullname: "Siddharth Nair", qualifications: "B.Tech", highestScore: 84, attempt_no: 1, profileImageURL: null },
      { _id: "10", fullname: "Neha Verma", qualifications: "B.Tech CSE", highestScore: 80, attempt_no: 3, profileImageURL: null },
    ],
    cybersecurity: [
      { _id: "11", fullname: "Akshay Mehta", qualifications: "B.Tech CSE, Sec+", highestScore: 95, attempt_no: 2, profileImageURL: null },
      { _id: "12", fullname: "Divya Chopra", qualifications: "M.Tech Security", highestScore: 92, attempt_no: 1, profileImageURL: null },
      { _id: "13", fullname: "Harjeet Singh", qualifications: "B.Tech, CEH", highestScore: 89, attempt_no: 3, profileImageURL: null },
      { _id: "14", fullname: "Pooja Reddy", qualifications: "B.Tech CSE", highestScore: 86, attempt_no: 2, profileImageURL: null },
      { _id: "15", fullname: "Manish Yadav", qualifications: "B.Tech", highestScore: 82, attempt_no: 4, profileImageURL: null },
    ]
  };

  let currentRole = "backend"; // Default role

  /* ── Nav user (dummy) ── */
  const navName = document.getElementById("navName");
  const navAvatar = document.getElementById("navAvatar");
  fetch("/api/current-user")
  .then(res => res.json())
  .then(user => {
    if(Object.keys(user).length){
    navName.innerText = user.fullname;
    navAvatar.innerHTML = `
    <img src=${user.profileImageURL}>
    `;
    const link = document.getElementById("userStats");
    link.href = `/stats/${user._id}`
    }
    else{
        const loginCheck = document.getElementById("loginCheck");
        const a = document.createElement("a");
        a.className = "nav-item";
        a.href = "/user/login";
        a.title = "Login";
        a.innerHTML = `
          <span class="nav-icon">🔐</span>
          <span class="nav-label">Login</span>
          `;
        loginCheck.appendChild(a);
    }
  })
  .catch(() => {
    // If fetch fails, continue with dummy data
    navName.innerText = "Guest User";
  });

  /* ── Initialize Role Buttons ── */
  function initializeRoleButtons() {
    const roleButtons = document.getElementById("roleButtons");
    const roles = ["backend", "frontend", "cybersecurity"];
    
    roles.forEach(role => {
      const btn = document.createElement("button");
      btn.className = `role-btn ${role === currentRole ? 'active' : ''}`;
      btn.textContent = role.charAt(0).toUpperCase() + role.slice(1);
      btn.onclick = () => switchRole(role);
      roleButtons.appendChild(btn);
    });
  }

  /* ── Switch Role ── */
  function switchRole(role) {
    currentRole = role;
    
    // Update active button
    const buttons = document.querySelectorAll('.role-btn');
    buttons.forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.toLowerCase() === role.toLowerCase()) {
        btn.classList.add('active');
      }
    });

    // Load and render leaderboard for selected role
    loadLeaderboard(role);
  }

  /* ── Helpers ── */
  const tierClass = i => i===0?"gold":i===1?"silver":i===2?"bronze":"purple";
  const rankLabel = i => ["1st","2nd","3rd"][i] || `#${i+1}`;
  const medal     = i => ["🥇","🥈","🥉"][i] || "🎯";
  const initials  = n => n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const avatarColors = ["#6366f1","#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#06b6d4","#ef4444"];
  
  /* ── Render ── */
  function renderCards(users) {
    const grid = document.getElementById("lbGrid");
    grid.innerHTML = "";
    if (!users || users.length === 0) {
      grid.innerHTML = `<div class="lb-loading" style="grid-column:1/-1">No results yet. Be the first to attempt!</div>`;
      return;
    }
    users.forEach((u, i) => {
      const t      = tierClass(i);
      const isTop3 = i < 3;
      const color  = avatarColors[i % avatarColors.length];
      const card   = document.createElement("div");
      card.className = `lb-card ${t}`;
      
      const avatarEl = u.profileImageURL
        ? `<img class="av" src="${u.profileImageURL}" alt="${u.fullname}" style="border-radius:50%;width:54px;height:54px;object-fit:cover;">`
        : `<div class="av" style="background:${color}">${initials(u.fullname)}</div>`;
      card.innerHTML = `
      <a href = '/stats/${u._id}' style="text-decoration:none">
        ${isTop3 ? `<div class="rank-badge ${t}">${rankLabel(i)}</div>` : ""}
        <div class="card-top" style="margin-top:${isTop3?"8px":"0"}">
          ${avatarEl}
          <div class="user-info">
            <div class="uname">${u.fullname}</div>
            <div class="udeg">${u.qualifications || "—"}</div>
          </div>
          <div class="score-block">
            <div class="sval">${u.highestScore}</div>
            <div class="slbl">score</div>
          </div>
        </div>
        <hr class="divider">
        <div class="card-footer">
          <span>${medal(i)} Rank ${rankLabel(i)}</span>
          <span class="attempt-pill">Attempt ${u.attempt_no}</span>
        </div>
        </a>
      `;
      grid.appendChild(card);
    });
  }

  /* ── Fetch and Load Data ── */
  async function loadLeaderboard(role = "backend") {
    try {
      // For now, using dummy data. Later replace with actual API call:
      // const response = await fetch(`/leaderboard?role=${role}`);
      // let users = await response.json();
      
      let users = dummyData[role] || [];
      
      // Sort by highestScore in descending order
      users.sort((a, b) => b.highestScore - a.highestScore);
      
      renderCards(users);
    } catch (error) {
      console.error('Error loading leaderboard:', error);
      const grid = document.getElementById("lbGrid");
      grid.innerHTML = `<div class="lb-loading" style="grid-column:1/-1; color: #ef4444;">Failed to load leaderboard. Please try again later.</div>`;
    }
  }

  // Initialize buttons and load default leaderboard
  initializeRoleButtons();
  loadLeaderboard("backend");
</script>
</body>
</html>
