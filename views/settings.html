<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary-dark: #0f172a;
      --primary-dark-hover: #1e293b;
      --bg-main: #f8f8f6;
      --surface: #ffffff;
      --border-color: #e4e4e0;
      --text-dark: #0f172a;
      --text-mid: #6b7280;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 80px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.02);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 4px 14px 4px 4px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid #e5e7eb;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
    }
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 800; color: var(--primary-dark);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .nav-logo-icon {
      background: var(--primary-dark);
      color: #fff;
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon i { color: #fff; font-size: 12px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── SIDEBAR (Flat styling) ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      background: var(--surface);
      border-right: 1px solid var(--border-color);
      z-index: 50;
    }
    .nav-items { 
      display: flex; flex-direction: column; gap: 8px; flex: 1; width: 100%; align-items: center;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      width: 64px; height: 64px; border-radius: 12px; text-decoration: none; color: var(--text-muted);
      transition: all 0.2s ease;
    }
    .nav-item:hover { background-color: #f3f4f6; color: var(--text-dark); }
    .nav-item.active {
      background-color: var(--primary-dark); color: #ffffff;
    }
    .nav-icon { 
      font-size: 18px; line-height: 1; 
    }
    .nav-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .nav-item.active .nav-label { 
      color: #ffffff; 
    }
    .sidebar-bottom { width: 100%; display: flex; justify-content: center; padding-top: 16px; border-top: 1px solid var(--border-color); }

    /* ── MAIN CONTENT AREA ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 24px;
      display: flex;
      justify-content: center;
    }

    .settings-wrapper {
      width: 100%;
      max-width: 520px;
    }

    .panel-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.25rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }

    .panel-header {
      margin-bottom: 24px;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .panel-subtitle {
      font-size: 13px;
      color: var(--text-mid);
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 0.02em;
    }

    .text-field, .select-field {
      width: 100%;
      height: 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0 13px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .text-field:focus, .select-field:focus {
      border-color: var(--primary-dark);
      background-color: #fff;
    }

    .select-field {
      appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px 14px;
      padding-right: 40px;
    }

    /* File upload design */
    .avatar-upload-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 12px;
      border-radius: 8px;
    }

    .avatar-preview-box {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background-color: var(--surface);
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 20px;
      color: var(--text-muted);
    }

    .avatar-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .file-input-hidden {
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-mid);
    }

    .submit-btn {
      width: 100%;
      height: 44px;
      background-color: var(--primary-dark);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .submit-btn:hover {
      background-color: var(--primary-dark-hover);
    }

    .status-alert {
      padding: 10px 13px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
    }

    .status-success {
      background-color: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
      display: block;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">U</div>
      <span class="user-name-nav" id="navName">User Profile</span>
    </div>
  </div>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-target"></i></div>
    <span>Interview Portal</span>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items">
      <a class="nav-item" href="/interview/preparation" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item" title="User Stats" id="userStats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item active" href="/settings" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="settings-wrapper">
      
      <div class="panel-card">
        <div class="panel-header">
          <h1 class="panel-title">Account Settings</h1>
          <p class="panel-subtitle">Manage personal profile data and specialization tracks</p>
        </div>

        <div class="status-alert" id="statusMsg"></div>

        <form id="settingsForm" enctype="multipart/form-data">
          <div class="form-grid">
            
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" name="fullname" id="formFullname" class="text-field" placeholder="Enter full name" required />
            </div>

            <div class="form-group">
              <label class="form-label">Profile Image</label>
              <div class="avatar-upload-row">
                <div class="avatar-preview-box" id="formPreview">👤</div>
                <input type="file" name="profileImage" id="formFile" class="file-input-hidden" accept="image/*" />
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label class="form-label">Age</label>
                <input type="number" name="age" id="formAge" class="text-field" placeholder="Age" />
              </div>
              <div class="form-group">
                <label class="form-label">Gender</label>
                <select name="gender" id="formGender" class="select-field">
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Specialization Track</label>
              <select name="role" id="formRole" class="select-field">
                <option value="frontend">Frontend</option>
                <option value="backend">Backend</option>
                <option value="cybersecurity">Cybersecurity</option>
              </select>
            </div>

          </div>

          <button type="submit" class="submit-btn">Save Preferences Matrix</button>
        </form>
      </div>

    </div>
  </main>
</div>

<script>
  const settingsForm = document.getElementById("settingsForm");
  const statusMsg = document.getElementById("statusMsg");
  const navName = document.getElementById("navName");
  const navAvatar = document.getElementById("navAvatar");
  const formPreview = document.getElementById("formPreview");

  // Form Inputs mapped cleanly
  const formFullname = document.getElementById("formFullname");
  const formAge = document.getElementById("formAge");
  const formGender = document.getElementById("formGender");
  const formRole = document.getElementById("formRole");
  const userStats = document.getElementById("userStats");

  // Sync session profiles dynamically
  fetch("/api/current-user")
  .then(res => res.json())
  .then(user => {
    if(user && Object.keys(user).length) {
      navName.innerText = user.fullname || "User Profile";
      formFullname.value = user.fullname || "";
      formAge.value = user.age || "";
      formGender.value = user.gender || "Male";
      formRole.value = user.role ? user.role.toLowerCase() : "frontend";
      
      if(user._id) userStats.href = `/stats/${user._id}`;
      
      if(user.profileImageURL) {
        const imgTag = `<img src="${user.profileImageURL}" alt="User Avatar">`;
        navAvatar.innerHTML = imgTag;
        formPreview.innerHTML = imgTag;
      }
    }
  }).catch(() => {});

  // Local sync file upload stream rendering
  document.getElementById("formFile").addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        formPreview.innerHTML = `<img src="${e.target.result}">`;
      }
      reader.readAsDataURL(file);
    }
  });

  // Handle Form Submission
  settingsForm.addEventListener("submit", function(e) {
    e.preventDefault();
    statusMsg.style.display = "none";
    statusMsg.className = "status-alert";
    
    const formData = new FormData(settingsForm);
    
    fetch("/settings/", {
      method: "POST",
      body: formData
    })
    .then(res => {
      if (!res.ok) throw new Error("Matrix configuration error.");
      return res.json();
    })
    .then(data => {
      statusMsg.innerText = "Preferences metrics synchronized successfully! 🎉";
      statusMsg.classList.add("status-success");
      
      if (data.fullname) navName.innerText = data.fullname;
      if (data.profileImageURL) {
        const stamp = `<img src="${data.profileImageURL}?t=${new Date().getTime()}">`;
        navAvatar.innerHTML = stamp;
        formPreview.innerHTML = stamp;
      }
    })
    .catch(err => {
      statusMsg.innerText = "Error syncing changes to remote architecture parameters.";
      statusMsg.style.backgroundColor = "#fef2f2";
      statusMsg.style.borderColor = "#fca5a5";
      statusMsg.style.color = "#991b1b";
      statusMsg.style.display = "block";
    });
  });
</script>
</body>
</html>
