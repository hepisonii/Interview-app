<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Session – Interview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary-dark: #0f172a;
      --primary-dark-hover: #1e293b;
      --bg-main: #f8f8f6;
      --surface: #ffffff;
      --border-color: #e4e4e0;
      --text-dark: #0f172a;
      --text-mid: #6b7280;
      --text-muted: #9ca3af;
      --nav-h: 68px;
      --sidebar-w: 80px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.02);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 4px 14px 4px 4px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid #e5e7eb;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name-nav {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
    }
    
    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
    }

    /* Timer */
    .nav-timer {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      padding: 6px 14px;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .nav-timer.warning {
      border-color: #f97316;
      background-color: #fff7ed;
    }
    .nav-timer.danger {
      border-color: #ef4444;
      background-color: #fef2f2;
      animation: pulseRed 1s ease-in-out infinite;
    }
    @keyframes pulseRed {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }
    }
    .timer-icon-wrap {
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    .timer-display {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
      font-variant-numeric: tabular-nums;
    }
    .nav-timer.warning .timer-display { color: #ea580c; }
    .nav-timer.danger .timer-display { color: #dc2626; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: var(--nav-h); left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      background: var(--surface);
      border-right: 1px solid var(--border-color);
      z-index: 50;
    }
    .nav-items { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      flex: 1; 
      width: 100%; 
      align-items: center; 
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 64px; height: 64px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: var(--text-muted);
    }
    
    .nav-item:hover:not(.disabled) {
      background-color: #f3f4f6;
      color: var(--text-dark);
    }
    
    .nav-item.active {
      background-color: var(--primary-dark);
      color: #ffffff;
    }
    .nav-item.disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .nav-icon { 
      font-size: 18px; 
      line-height: 1; 
    }
    
    .nav-label {
      font-size: 9px; 
      font-weight: 700;
      text-transform: uppercase; 
      letter-spacing: 0.05em;
    }
    .nav-item.active .nav-label { 
      color: #ffffff; 
    }

    .sidebar-bottom { 
      width: 100%; 
      display: flex; 
      justify-content: center; 
      padding-top: 16px; 
      border-top: 1px solid var(--border-color); 
    }

    /* ── MAIN CONTENT AREA ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 24px 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── CONTAINER & CARDS ── */
    .question-container, .results-container {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.04);
      margin-bottom: 24px;
    }

    .question-header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .question-number {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    /* ── BOTTOM APP INPUT PILL BAR ── */
    .bottom-bar {
      position: fixed;
      bottom: 32px;
      left: var(--sidebar-w);
      right: 0;
      z-index: 90;
      padding: 0 24px;
      display: flex;
      justify-content: center;
    }

    .input-pill {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px 12px 12px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .answer-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      outline: none;
      resize: none;
      min-height: 24px;
      max-height: 140px;
      line-height: 1.5;
      padding: 4px 0;
    }
    .answer-input::placeholder { color: var(--text-muted); }

    .answer-btn {
      height: 38px;
      padding: 0 20px;
      background-color: var(--primary-dark);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .answer-btn:hover {
      background-color: var(--primary-dark-hover);
    }

    .answer-status {
      display: flex;
      align-items: center;
      padding-left: 8px;
      border-left: 1px solid var(--border-color);
      height: 24px;
      align-self: center;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e5e7eb;
    }
    .status-dot.answered {
      background: #10b981;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Loading & Utility */
    .loading {
      text-align: center;
      padding: 40px 0;
      color: var(--text-mid);
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--primary-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 12px;
      padding: 20px;
      color: #dc2626;
      text-align: center;
    }

    /* Overlay */
    .timeup-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    .timeup-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .timeup-emoji { font-size: 44px; margin-bottom: 16px; }
    .timeup-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
    .timeup-sub { font-size: 14px; color: var(--text-mid); line-height: 1.5; margin-bottom: 24px; }

    /* ── REVIEW CARD — Fixed layout ── */
    .review-card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      /* Fixed height so footer never moves */
      height: calc(100vh - var(--nav-h) - 80px);
      max-height: 720px;
      min-height: 480px;
      overflow: hidden;
    }

    /* Top strip: question number + progress bar */
    .review-card-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .review-card-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .review-progress-bar-track {
      height: 3px;
      background: #f0f0ee;
      border-radius: 2px;
      overflow: hidden;
    }
    .review-progress-bar-fill {
      height: 100%;
      background: var(--primary-dark);
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* Score pill in header */
    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    /* Scrollable content body */
    .review-card-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      /* Custom subtle scrollbar */
      scrollbar-width: thin;
      scrollbar-color: #e4e4e0 transparent;
    }
    .review-card-body::-webkit-scrollbar { width: 4px; }
    .review-card-body::-webkit-scrollbar-track { background: transparent; }
    .review-card-body::-webkit-scrollbar-thumb { background: #e4e4e0; border-radius: 4px; }

    .review-question-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.4;
    }

    .review-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
    }

    .review-content-box {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-dark);
      padding: 14px 16px;
      background: #f9f9f7;
      border: 1px solid var(--border-color);
      border-radius: 10px;
    }

    /* Star rating row */
    .star-row {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .star-icon {
      font-size: 18px;
      color: #d1d5db;
      transition: color 0.15s;
    }
    .star-icon.lit {
      color: #f59e0b;
    }
    .star-score-text {
      margin-left: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
    }

    /* ── REVIEW FOOTER — always pinned ── */
    .review-card-footer {
      padding: 14px 28px;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    /* Dot navigator */
    .footer-dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }
    .nav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #e5e7eb;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      border: none;
      padding: 0;
      flex-shrink: 0;
    }
    .nav-dot:hover { transform: scale(1.3); }
    .nav-dot.is-active {
      background: var(--primary-dark);
      transform: scale(1.2);
    }
    .nav-dot.is-done {
      background: #10b981;
    }

    /* Footer buttons */
    .footer-btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-ghost {
      height: 36px;
      padding: 0 16px;
      border: 1px solid var(--border-color);
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-ghost:hover { background: #f9f9f7; color: var(--text-dark); }
    .btn-ghost:disabled { opacity: 0.35; cursor: default; }
    .btn-ghost:disabled:hover { background: transparent; color: var(--text-mid); }

    .btn-solid {
      height: 36px;
      padding: 0 20px;
      background-color: var(--primary-dark);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background-color 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-solid:hover { background-color: var(--primary-dark-hover); }
    .btn-solid.green { background-color: #10b981; }
    .btn-solid.green:hover { background-color: #059669; }

    /* ── RESULTS STYLES ── */
    .results-header { text-align: center; margin-bottom: 32px; }
    .results-emoji { font-size: 48px; margin-bottom: 12px; }
    .results-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
    .results-subtitle { font-size: 14px; color: var(--text-mid); }
    
    .final-score-section { text-align: center; padding: 24px 0; }
    .final-score-label { font-size: 12px; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .final-score-value { font-family: 'Playfair Display', serif; font-size: 54px; font-weight: 600; color: var(--primary-dark); margin-bottom: 12px; }
    .final-score-message { font-size: 14px; color: var(--text-mid); line-height: 1.5; }

    .nav-item-btn-styled {
      display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 32px; background-color: var(--primary-dark); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; font-family: 'DM Sans', sans-serif; transition: background-color 0.2s;
    }
    .nav-item-btn-styled:hover { background-color: var(--primary-dark-hover); }

    .hidden { display: none; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">U</div>
      <span class="user-name-nav" id="navName"></span>
    </div>
  </div>

  <div class="nav-title">
    <span>Interview Session</span>
  </div>

  <div class="nav-timer" id="navTimer">
    <div class="timer-icon-wrap"><i class="ti ti-clock"></i></div>
    <span class="timer-display" id="timerDisplay">40:00</span>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-items" id="loginCheck">
      <a class="nav-item active" href="/interview/attempt" title="Preparation">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Prep</span>
      </a>
      <a class="nav-item disabled" title="User Stats" id="userStats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-item disabled" href="/leaderboard/display" title="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-item disabled" href="/settings" title="Settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/user/logout" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div id="chatContent">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading your interview questions...</p>
      </div>
    </div>

    <div id="resultsContent" class="hidden">
      <div class="results-container">
        <div class="results-header">
          <div class="results-emoji">🎉</div>
          <h1 class="results-title">Interview Complete!</h1>
          <p class="results-subtitle">Your answers have been reviewed by our AI. See your detailed feedback below.</p>
        </div>
        <div id="feedbackList"></div>
      </div>
    </div>
  </main>
</div>

<div class="bottom-bar" id="bottomBar">
  <div style="width:100%; max-width:680px;">
    <div class="input-pill">
      <textarea
        class="answer-input"
        id="answerInput"
        placeholder="Write your answer here..."
        rows="1"></textarea>
      <button type="button" class="answer-btn" id="answerBtn">
        <span class="btn-text">Answer</span>
      </button>
      <div class="answer-status">
        <div class="status-dot" id="statusDot" title="Not answered yet"></div>
      </div>
    </div>
    <p class="input-hint">Shift+Enter for new line | Enter to submit</p>
  </div>
</div>

<script>
  // ══════════════════════════════
  // TIMER — 40 minutes countdown
  // ══════════════════════════════
  const TOTAL_SECONDS = 40 * 60;
  let secondsLeft = TOTAL_SECONDS;
  let timerInterval = null;

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function updateTimerUI() {
    const display = document.getElementById('timerDisplay');
    const timerEl = document.getElementById('navTimer');
    display.textContent = formatTime(secondsLeft);
    timerEl.classList.remove('warning', 'danger');
    if (secondsLeft <= 60) {
      timerEl.classList.add('danger');
    } else if (secondsLeft <= 5 * 60) {
      timerEl.classList.add('warning');
    }
  }

  function startTimer() {
    updateTimerUI();
    timerInterval = setInterval(() => {
      secondsLeft--;
      updateTimerUI();
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        onTimeUp();
      }
    }, 1000);
  }

  function onTimeUp() {
    document.getElementById('bottomBar').style.display = 'none';
    const overlay = document.createElement('div');
    overlay.className = 'timeup-overlay';
    overlay.innerHTML = `
      <div class="timeup-card">
        <div class="timeup-emoji">⏰</div>
        <h2 class="timeup-title">Time's Up!</h2>
        <div class="timeup-sub">
          Your 40-minute interview session has ended.<br>
          Submit your answers now.
        </div>
        <button class="nav-item-btn-styled" onclick="submitQuiz()">📥 Submit Answers</button>
      </div>
    `;
    document.body.appendChild(overlay);
  }

  // ══════════════════════════════
  // STATE
  // ══════════════════════════════
  let questions = [];
  let currentIndex = 0;
  let userAnswersArray = [];
  let feedbackData = [];
  let finalTotalScore = 0;

  // ══════════════════════════════
  // USER INFO
  // ══════════════════════════════
  fetch("/api/current-user")
    .then(r => r.json())
    .then(user => {
      if(Object.keys(user).length){
        document.getElementById("navName").innerText = user.fullname;
        document.getElementById("navAvatar").innerHTML = `<img src="${user.profileImageURL}">`;
        const link = document.getElementById("userStats");
        link.href = `/stats/${user._id}`;
        link.classList.remove("disabled");
        document.querySelectorAll('.sidebar .nav-item.disabled').forEach(item => {
          item.classList.remove('disabled');
        });
      } else {
        const loginCheck = document.getElementById("loginCheck");
        const a = document.createElement("a");
        a.className = "nav-item";
        a.href = "/user/login";
        a.title = "Login";
        a.innerHTML = `
          <span class="nav-icon">🔐</span>
          <span class="nav-label">Login</span>
        `;
        loginCheck.appendChild(a);
      }
    })
    .catch(() => {
      document.getElementById("navName").innerText = "User";
      document.getElementById("navAvatar").textContent = "U";
    });

  // ══════════════════════════════
  // FETCH QUESTIONS
  // ══════════════════════════════
  fetch("/interview/fetch")
    .then(res => res.json())
    .then(data => {
      console.log("Questions from API:", data);
      questions = data;
      currentIndex = 0;
      console.log("Total questions: ", questions.length);
      if (questions && questions.length > 0) {
        showQuestion(currentIndex);
        startTimer();
      } else {
        showError("No questions received");
      }
    })
    .catch(error => {
      console.error("API Error:", error);
      showError("Failed to load questions: " + error.message);
    });

  // ══════════════════════════════
  // DISPLAY QUESTION
  // ══════════════════════════════
  function showQuestion(index) {
    const currentQuestion = questions[index];
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container">
        <div class="question-header">
          <span class="question-number">Question ${index + 1} of ${questions.length}</span>
        </div>
        <div class="question-text">${currentQuestion.question}</div>
      </div>
    `;
    const textarea = document.getElementById("answerInput");
    textarea.value = "";
    textarea.style.height = "auto";
    textarea.focus();
  }

  function showError(msg) {
    document.getElementById("chatContent").innerHTML = `
      <div class="error-message"><h3>Error</h3><p>${msg}</p></div>
    `;
  }

  // ══════════════════════════════
  // ANSWER SUBMISSION
  // ══════════════════════════════
  document.getElementById("answerBtn").addEventListener("click", () => {
    const textarea = document.getElementById("answerInput");
    const answerText = textarea.value.trim();
    if (!answerText) {
      alert("Please write an answer before proceeding!");
      return;
    }
    const currentQuestion = questions[currentIndex];
    const answerObject = {
      questionId: currentQuestion._id,
      question: currentQuestion.question,
      answer: answerText
    };
    userAnswersArray.push(answerObject);
    console.log("📝 Answer saved:", answerObject);
    console.log("📋 All answers so far:", userAnswersArray);

    if (currentIndex === questions.length - 1) {
      showQuizComplete();
    } else {
      currentIndex++;
      showQuestion(currentIndex);
    }
  });

  // ══════════════════════════════
  // QUIZ COMPLETE
  // ══════════════════════════════
  function showQuizComplete() {
    clearInterval(timerInterval);
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container" style="text-align: center;">
        <div style="font-size: 44px; margin-bottom: 16px;">✨</div>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text-dark); margin-bottom: 12px;">Quiz Complete!</h2>
        <p style="color: var(--text-mid); font-size: 14px; margin-bottom: 24px; line-height: 1.5;">
          You've answered all ${questions.length} questions.<br>✓ Ready to submit!
        </p>
        <div style="background: #f9fafb; border: 1px solid #e5e7eb; padding: 20px; border-radius: 12px; margin-bottom: 8px;">
          <p style="color: var(--text-mid); font-size: 13px; margin-bottom: 18px;">
            Questions answered: <strong style="color: var(--text-dark);">${userAnswersArray.length}/${questions.length}</strong>
          </p>
          <button class="nav-item-btn-styled" onclick="submitQuiz()">
            Submit All Answers
          </button>
        </div>
      </div>
    `;
    document.getElementById("bottomBar").style.display = "none";
  }

  // ══════════════════════════════
  // SUBMIT & SHOW RESULTS
  // ══════════════════════════════
  function submitQuiz() {
    clearInterval(timerInterval);
    const overlay = document.querySelector('.timeup-overlay');
    if (overlay) overlay.remove();

    const payload = { answers: userAnswersArray };
    console.log("📤 Submitting:", JSON.stringify(payload, null, 2));

    document.getElementById("chatContent").innerHTML = `
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Submitting your answers to the backend...</p>
      </div>
    `;
    fetch(`/fetch/attemptId?`)
      .then(res => res.json())
      .then(attemptData => {
        const attemptId = attemptData.attemptId || attemptData._id || attemptData;
        return fetch(`/interview/attempt/${attemptId}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      })
      .then(res => {
        if (!res.ok) {
          return res.text().then(text => {
            throw new Error(`HTTP error! status: ${res.status} - ${text}`);
          });
        }
        return res.json();
      })
      .then((submitResponse) => {
        console.log("🔥 FINAL RESPONSE:", submitResponse);
        const { data, totalScore } = submitResponse;
        finalTotalScore = totalScore || 0;
        displayResults(data);
      })
      .catch(error => {
        console.error("❌ Submission error:", error);
        document.getElementById("chatContent").innerHTML = `
          <div class="error-message">
            <h3>❌ Submission Error</h3>
            <p><strong>Error:</strong> ${error.message}</p>
          </div>
        `;
      });
  }

  // ══════════════════════════════
  // DISPLAY RESULTS — fixed review card
  // ══════════════════════════════
  let reviewIndex = 0;
  let reviewData = [];

  function displayResults(data) {
    reviewData = data;
    reviewIndex = 0;
    document.getElementById("bottomBar").style.display = "none";
    renderReviewCard(reviewIndex);
  }

  function buildStars(score) {
    let html = '<div class="star-row">';
    for (let i = 1; i <= 5; i++) {
      html += `<span class="star-icon ${i <= score ? 'lit' : ''}">★</span>`;
    }
    html += `<span class="star-score-text">${score} / 5</span></div>`;
    return html;
  }

  function buildDots(total, current) {
    let html = '<div class="footer-dots">';
    for (let i = 0; i < total; i++) {
      let cls = 'nav-dot';
      if (i === current) cls += ' is-active';
      else if (i < current) cls += ' is-done';
      html += `<button class="${cls}" onclick="jumpToReview(${i})" title="Question ${i + 1}"></button>`;
    }
    html += '</div>';
    return html;
  }

  function renderReviewCard(index) {
    const item = reviewData[index];
    const total = reviewData.length;
    const isLast = index === total - 1;
    const progressPct = Math.round(((index + 1) / total) * 100);

    const ua = userAnswersArray.find(
      a => String(a.questionId) === String(item.questionId)
    );

    const prevDisabled = index === 0 ? 'disabled' : '';

    const nextLabel = isLast
      ? `See Score <span style="font-size:15px;">→</span>`
      : `Next <span style="font-size:15px;">→</span>`;
    const nextClass = isLast ? 'btn-solid green' : 'btn-solid';
    const nextAction = isLast ? 'showTotalScoreScreen()' : `jumpToReview(${index + 1})`;

    document.getElementById("chatContent").classList.remove("hidden");
    document.getElementById("resultsContent").classList.add("hidden");

    document.getElementById("chatContent").innerHTML = `
      <div class="review-card">

        <!-- Fixed header -->
        <div class="review-card-header">
          <div class="review-card-header-top">
            <span class="question-number">Question ${index + 1} of ${total}</span>
            <span class="score-pill">★ ${item.score} / 5</span>
          </div>
          <div class="review-progress-bar-track">
            <div class="review-progress-bar-fill" style="width: ${progressPct}%"></div>
          </div>
        </div>

        <!-- Scrollable body -->
        <div class="review-card-body">

          <div class="review-question-text">${ua?.question || ""}</div>

          <div>
            <div class="review-section-label">✍️ Your answer</div>
            <div class="review-content-box">${item.answer}</div>
          </div>

          <div>
            <div class="review-section-label">⭐ Score</div>
            ${buildStars(item.score)}
          </div>

          <div>
            <div class="review-section-label">🤖 AI feedback</div>
            <div class="review-content-box">${item.aiFeedback || "No feedback available"}</div>
          </div>

        </div>

        <!-- Fixed footer — never moves -->
        <div class="review-card-footer">
          ${buildDots(total, index)}
          <div class="footer-btn-group">
            <button class="btn-ghost" onclick="jumpToReview(${index - 1})" ${prevDisabled}>
              ← Prev
            </button>
            <button class="${nextClass}" onclick="${nextAction}">
              ${nextLabel}
            </button>
          </div>
        </div>

      </div>
    `;
  }

  function jumpToReview(index) {
    if (index < 0 || index >= reviewData.length) return;
    reviewIndex = index;
    renderReviewCard(reviewIndex);
    // Scroll body back to top on navigation
    setTimeout(() => {
      const body = document.querySelector('.review-card-body');
      if (body) body.scrollTop = 0;
    }, 0);
  }

  function showTotalScoreScreen() {
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container" style="text-align: center;">
        <div class="final-score-section">
          <div class="results-emoji">📊</div>
          <h2 class="final-score-label">Interview Performance Summary</h2>
          <div class="final-score-value">${finalTotalScore}<span style="font-size: 20px; color: var(--text-muted); font-family: 'DM Sans', sans-serif;">/100</span></div>
          <p class="final-score-message">
            Great job! You have successfully completed and reviewed your entire performance assessment profile.
          </p>
          <div style="margin-top: 24px;">
            <button onclick="showDone()" class="nav-item-btn-styled" style="background-color: #10b981;">
              Finish Interview ✓
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function showDone() {
    document.getElementById("chatContent").innerHTML = `
      <div class="question-container" style="text-align: center;">
        <div style="font-size: 44px; margin-bottom: 16px;">🎉</div>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text-dark); margin-bottom: 12px;">All Done!</h2>
        <p style="color: var(--text-mid); font-size: 14px; line-height: 1.5; margin-bottom: 24px;">
          You've reviewed all your answers.<br>Good luck with your results!
        </p>
        <a href="/interview/preparation" class="nav-item-btn-styled">
          🏠 Back to Home
        </a>
      </div>
    `;
  }

  // ══════════════════════════════
  // TEXTAREA AUTO-GROW
  // ══════════════════════════════
  const textarea = document.getElementById("answerInput");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
  });
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("answerBtn").click();
    }
  });
</script>
</body>
</html>
